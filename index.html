<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
   // 🌐 PHASE 2: FULL SETUP / CONTROL PANEL ADDED

// 🌐 PHASE 3: CARDS + INCOME + WARNINGS ADDED

// 🌐 FIXED PHASE 3 (buttons + setup working + better UI)

// 🌐 FIXED PHASE 3 (buttons + setup working + better UI)

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 4: EDIT EXPENSE + UI POLISH + STORE LABEL + CATEGORY REPORT

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

// 🌐 PHASE 4 FIXED: ALL VIEWS RESTORED + NAV WORKING

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);

  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });
  const [storeSuggestions, setStoreSuggestions] = useState([]);
  const normalizeStore = (s) => (s || "").trim();
  const keyStore = (s) => normalizeStore(s).toLowerCase();
  const [editExpenseIndex, setEditExpenseIndex] = useState(null);

  useEffect(() => {
    const savedExpenses = JSON.parse(localStorage.getItem("expenseAppData") || "[]");
    setExpenses(savedExpenses);
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));

    // build store suggestions
    const uniqueStores = [...new Set(savedExpenses.map(e => e.store).filter(Boolean))];
    setStoreSuggestions(uniqueStores);
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));

    // update store suggestions automatically (dedupe case-insensitive)
    const map = {};
    expenses.forEach(e => {
      const name = normalizeStore(e.store);
      if (!name) return;
      const k = keyStore(name);
      if (!map[k]) map[k] = name; // keep first seen casing
    });
    setStoreSuggestions(Object.values(map));
  }, [expenses]);

  // ===== EXPENSE =====
  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) return alert("Fill all fields");

    const cleanedStore = normalizeStore(form.store);

    const newItem = { ...form, store: cleanedStore, amount: parseFloat(form.amount) };

    if (editExpenseIndex !== null) {
      const updated = [...expenses];
      updated[editExpenseIndex] = newItem;
      setExpenses(updated);
      setEditExpenseIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditExpenseIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // ===== NAV =====
  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
    React.createElement("button", { type: "button", onClick: () => setView("dashboard"), className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, "Dashboard"),
    React.createElement("button", { type: "button", onClick: () => setView("setup"), className: "bg-gray-700 text-white px-4 py-2 rounded shadow" }, "Setup"),
    React.createElement("button", { type: "button", onClick: () => setView("report"), className: "bg-green-600 text-white px-4 py-2 rounded shadow" }, "Vendor Report"),
    React.createElement("button", { type: "button", onClick: () => setView("categoryReport"), className: "bg-purple-600 text-white px-4 py-2 rounded shadow" }, "Category Report")
  );

  // ===== SETUP =====
  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [newCard, setNewCard] = useState("");
  const [newIncome, setNewIncome] = useState({ name: "", amount: "" });
  const [income, setIncome] = useState(JSON.parse(localStorage.getItem("expenseIncome") || "[]"));

  const [editCatIndex, setEditCatIndex] = useState(null);
  const [editCardIndex, setEditCardIndex] = useState(null);
  const [editIncomeIndex, setEditIncomeIndex] = useState(null);

  useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
  useEffect(() => localStorage.setItem("expenseCards", JSON.stringify(cards)), [cards]);
  useEffect(() => localStorage.setItem("expenseIncome", JSON.stringify(income)), [income]);

  const addCategory = () => {
    if (!newCategory.name || !newCategory.budget) return alert("Enter category + budget");
    if (editCatIndex !== null) {
      const updated = [...categories];
      updated[editCatIndex] = { name: newCategory.name, budget: parseFloat(newCategory.budget) };
      setCategories(updated);
      setEditCatIndex(null);
    } else {
      setCategories([...categories, { name: newCategory.name, budget: parseFloat(newCategory.budget) }]);
    }
    setNewCategory({ name: "", budget: "" });
  };

  const addCard = () => {
    if (!newCard) return alert("Enter card name");
    if (editCardIndex !== null) {
      const updated = [...cards];
      updated[editCardIndex] = newCard;
      setCards(updated);
      setEditCardIndex(null);
    } else {
      setCards([...cards, newCard]);
    }
    setNewCard("");
  };

  const addIncome = () => {
    if (!newIncome.name || !newIncome.amount) return alert("Enter income");
    if (editIncomeIndex !== null) {
      const updated = [...income];
      updated[editIncomeIndex] = { ...newIncome, amount: parseFloat(newIncome.amount) };
      setIncome(updated);
      setEditIncomeIndex(null);
    } else {
      setIncome([...income, { ...newIncome, amount: parseFloat(newIncome.amount) }]);
    }
    setNewIncome({ name: "", amount: "" });
  };

  if (view === "setup") {
    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,

      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Categories"),
        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Name", value: newCategory.name, onChange: e => setNewCategory({ ...newCategory, name: e.target.value }) }),
        React.createElement("input", { className: "border p-2 mr-2", type: "number", placeholder: "Budget", value: newCategory.budget, onChange: e => setNewCategory({ ...newCategory, budget: e.target.value }) }),
        React.createElement("button", { onClick: addCategory, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCatIndex !== null ? "Update" : "Add"),

        categories.map((c, i) => React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
          React.createElement("span", null, `${c.name} - $${c.budget}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => { setNewCategory(c); setEditCatIndex(i); }, className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => setCategories(categories.filter((_, idx) => idx !== i)), className: "text-red-600" }, "Delete")
          )
        ))
      ),

      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Cards"),
        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Card Name", value: newCard, onChange: e => setNewCard(e.target.value) }),
        React.createElement("button", { onClick: addCard, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCardIndex !== null ? "Update" : "Add"),

        cards.map((c, i) => React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
          React.createElement("span", null, c),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => { setNewCard(c); setEditCardIndex(i); }, className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => setCards(cards.filter((_, idx) => idx !== i)), className: "text-red-600" }, "Delete")
          )
        ))
      ),

      React.createElement("div", { className: "bg-white p-4 rounded shadow" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Income"),
        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Source", value: newIncome.name, onChange: e => setNewIncome({ ...newIncome, name: e.target.value }) }),
        React.createElement("input", { className: "border p-2 mr-2", type: "number", placeholder: "Amount", value: newIncome.amount, onChange: e => setNewIncome({ ...newIncome, amount: e.target.value }) }),
        React.createElement("button", { onClick: addIncome, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editIncomeIndex !== null ? "Update" : "Add"),

        income.map((inc, i) => React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
          React.createElement("span", null, `${inc.name} - $${inc.amount}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => { setNewIncome(inc); setEditIncomeIndex(i); }, className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => setIncome(income.filter((_, idx) => idx !== i)), className: "text-red-600" }, "Delete")
          )
        ))
      )
    );
  }

  // ===== VENDOR REPORT =====
  if (view === "report") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.store]) map[e.store] = [];
      map[e.store].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", { className: "text-xl font-bold mb-4" }, "Vendor Report"),
      Object.entries(map).map(([store, items]) => {
        const subtotal = items.reduce((s, i) => s + i.amount, 0);
        return React.createElement("div", { key: store, className: "mb-4" },
          React.createElement("h2", { className: "font-bold" }, `${store} — $${subtotal.toFixed(2)}`),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} | $${i.amount}`))
        );
      }),
      React.createElement("button", { onClick: () => window.print(), className: "mt-4 bg-blue-600 text-white px-4 py-2 rounded" }, "Print")
    );
  }

  // ===== CATEGORY REPORT =====
  if (view === "categoryReport") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.category]) map[e.category] = [];
      map[e.category].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", { className: "text-xl font-bold mb-4" }, "Category Report"),
      Object.entries(map).map(([cat, items]) => {
        const subtotal = items.reduce((s, i) => s + i.amount, 0);
        return React.createElement("div", { key: cat, className: "mb-4" },
          React.createElement("h2", { className: "font-bold" }, `${cat} — $${subtotal.toFixed(2)}`),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} | ${i.store} | $${i.amount}`))
        );
      }),
      React.createElement("button", { onClick: () => window.print(), className: "mt-4 bg-blue-600 text-white px-4 py-2 rounded" }, "Print")
    );
  }

  // ===== DASHBOARD =====
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,
    React.createElement("h1", { className: "text-2xl font-bold mb-4" }, "Dashboard"),

    React.createElement("div", { className: "mb-4" }, `Total Spent: $${total}`),

    // CATEGORY BARS
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      categories.map(cat => {
        const spent = expenses.filter(e => e.category === cat.name).reduce((s, e) => s + e.amount, 0);
        const percent = cat.budget ? (spent / cat.budget) * 100 : 0;

        return React.createElement("div", { key: cat.name, className: "mb-2" },
          React.createElement("div", null, `${cat.name} $${spent}/${cat.budget}`),
          React.createElement("div", { className: "w-full bg-gray-200 h-2" },
            React.createElement("div", {
              className: percent > 100 ? "bg-red-500 h-2" : percent > 80 ? "bg-yellow-400 h-2" : "bg-green-500 h-2",
              style: { width: Math.min(percent, 100) + "%" }
            })
          )
        );
      })
    ),

    // FORM
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4 space-x-2" },
      React.createElement("input", { className: "border p-2", type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement(React.Fragment, null,
        React.createElement("input", {
          className: "border p-2",
          placeholder: "Store",
          list: "store-list",
          value: form.store,
          onChange: e => {
            const val = e.target.value;
            const match = storeSuggestions.find(s => keyStore(s).startsWith(keyStore(val)));
            setForm({ ...form, store: match || val });
          }
        }),
        React.createElement("datalist", { id: "store-list" },
          // filter + rank suggestions (startsWith first, case-insensitive)
          storeSuggestions
            .filter(s => keyStore(s).includes(keyStore(form.store)))
            .sort((a, b) => {
              const ka = keyStore(a), kb = keyStore(b), q = keyStore(form.store);
              const aStarts = ka.startsWith(q) ? 0 : 1;
              const bStarts = kb.startsWith(q) ? 0 : 1;
              if (aStarts !== bStarts) return aStarts - bStarts;
              return ka.localeCompare(kb);
            })
            .slice(0, 8)
            .map((s, i) => React.createElement("option", { key: i, value: s }))
        )
      ),
      React.createElement("input", { className: "border p-2", type: "number", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),

      React.createElement("select", { className: "border p-2", value: form.category, onChange: e => setForm({ ...form, category: e.target.value }) },
        React.createElement("option", { value: "" }, "Category"),
        categories.map(c => React.createElement("option", { key: c.name }, c.name))
      ),

      React.createElement("select", { className: "border p-2", value: form.card, onChange: e => setForm({ ...form, card: e.target.value }) },
        React.createElement("option", { value: "" }, "Card"),
        cards.map(c => React.createElement("option", { key: c }, c))
      ),

      React.createElement("button", { type: "button", onClick: handleSubmit, className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, editExpenseIndex !== null ? "Update Expense" : "Add Expense")
    ),

    // LIST
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      expenses.map((e, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${e.date} | ${e.store} | $${e.amount}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => editExpense(i), className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => deleteExpense(i), className: "text-red-600" }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};

    </script>
  </body>
</html>
