<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

  <script>
   // UI + SETUP + AUTO CATEGORY + EDIT + GRAPH + MONTHLY + ALERTS + STORE MEMORY + REPORTS
const { useState, useEffect } = React;

function ExpenseTracker() {
  const [view, setView] = useState("dashboard");
  const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
  const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
  const [preview, setPreview] = useState([]);
  const [editIndex, setEditIndex] = useState(null);

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "" });
  const [newCategory, setNewCategory] = useState("");
  const [budgetMap, setBudgetMap] = useState(() => JSON.parse(localStorage.getItem("expenseBudgets") || "{}"));

  // ⭐ STORE MEMORY
  const [storeList, setStoreList] = useState(() => JSON.parse(localStorage.getItem("expenseStores") || "[]"));

  // 🗓 MONTH SELECTOR
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  });

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));
  }, [expenses]);

  useEffect(() => {
    localStorage.setItem("expenseCategories", JSON.stringify(categories));
  }, [categories]);

  useEffect(() => {
    localStorage.setItem("expenseBudgets", JSON.stringify(budgetMap));
  }, [budgetMap]);

  useEffect(() => {
    localStorage.setItem("expenseStores", JSON.stringify(storeList));
  }, [storeList]);

  const getCategory = (store) => {
    const s = store.toLowerCase();
    if (s.includes("fred meyer") || s.includes("safeway") || s.includes("costco")) return "Groceries";
    if (s.includes("shell") || s.includes("chevron")) return "Fuel";
    if (s.includes("amazon") || s.includes("target")) return "Shopping";
    return "";
  };

  const rememberStore = (store) => {
    const s = store.trim();
    if (!s) return;

    setStoreList(prev => {
      const exists = prev.some(x => x.toLowerCase() === s.toLowerCase());
      if (exists) return prev;
      return [...prev, s];
    });
  };

  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount) return;

    const autoCat = form.category || getCategory(form.store);

    rememberStore(form.store);

    if (editIndex !== null) {
      const updated = [...expenses];
      updated[editIndex] = { ...form, category: autoCat, amount: parseFloat(form.amount) };
      setExpenses(updated);
      setEditIndex(null);
    } else {
      setExpenses([...expenses, { ...form, category: autoCat, amount: parseFloat(form.amount) }]);
    }

    setForm({ date: "", store: "", amount: "", category: "" });
  };

  // 🔥 FILTER BY MONTH
  const filteredExpenses = expenses.filter(e => e.date && e.date.startsWith(selectedMonth));

  const total = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

  const categoryTotals = filteredExpenses.reduce((acc, e) => {
    const cat = e.category || "Uncategorized";
    acc[cat] = (acc[cat] || 0) + e.amount;
    return acc;
  }, {});

  const budgetData = Object.keys(categoryTotals).map(cat => {
    const spent = categoryTotals[cat] || 0;
    const budget = parseFloat(budgetMap[cat] || 0);
    return { cat, spent, budget };
  });

  const nav = React.createElement("div", { className: "flex gap-4 mb-6" },
    React.createElement("button", { className: "bg-blue-600 text-white px-4 py-2 rounded", onClick: () => setView("dashboard") }, "Dashboard"),
    React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("reports") }, "Reports"),
    React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("setup") }, "Setup")
  );

  // ================= REPORTS =================
  if (view === "reports") {
    const daysInMonth = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();
    const today = new Date().getDate();
    const expectedDaily = Object.values(budgetMap).reduce((a,b)=>a+parseFloat(b||0),0) / (daysInMonth || 1);
    const actualDaily = total / (today || 1);

    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,

      // DAILY CARD
      React.createElement("div", { className: "bg-white p-5 rounded-2xl shadow mb-4" },
        React.createElement("div", { className: "text-lg font-semibold mb-2" }, "Daily Spend"),
        React.createElement("div", { className: "text-sm text-gray-500" }, `Expected: $${expectedDaily.toFixed(2)} / day`),
        React.createElement("div", { className: "text-sm text-gray-500 mb-3" }, `Actual: $${actualDaily.toFixed(2)} / day`),

        React.createElement("div", { className: "w-full bg-gray-200 h-3 rounded" },
          React.createElement("div", {
            className: actualDaily > expectedDaily ? "bg-red-500 h-3 rounded" : "bg-green-500 h-3 rounded",
            style: { width: `${Math.min((actualDaily / (expectedDaily || 1)) * 100, 100)}%` }
          })
        )
      ),

      // CATEGORY GRAPH
      React.createElement("div", { className: "bg-white p-5 rounded-2xl shadow mb-4" },
        React.createElement("div", { className: "text-lg font-semibold mb-3" }, "Category Breakdown"),

        Object.entries(categoryTotals).map(([cat, amt], i) =>
          React.createElement("div", { key:i, className:"mb-3" },
            React.createElement("div", { className:"flex justify-between text-sm mb-1" },
              React.createElement("span", null, cat),
              React.createElement("span", null, `$${amt.toFixed(2)}`)
            ),
            React.createElement("div", { className:"w-full bg-gray-200 h-3 rounded" },
              React.createElement("div", {
                className:"bg-blue-500 h-3 rounded",
                style:{ width: `${(amt / total) * 100 || 0}%` }
              })
            )
          )
        )
      ),

      // SUMMARY CARD
      React.createElement("div", { className: "bg-white p-5 rounded-2xl shadow" },
        React.createElement("div", { className: "text-lg font-semibold mb-2" }, "Summary"),
        React.createElement("div", { className:"text-sm" }, `Total Spent: $${total.toFixed(2)}`),
        React.createElement("div", { className:"text-sm" }, `Categories: ${Object.keys(categoryTotals).length}`)
      )
    );
  }

  // ================= SETUP =================
  if (view === "setup") {
    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,
      React.createElement("div", { className: "bg-white p-4 rounded shadow" },
        React.createElement("div", { className: "font-bold mb-2" }, "Categories"),

        React.createElement("input", {
          className: "border p-2 mr-2",
          placeholder: "New Category",
          value: newCategory,
          onChange: e => setNewCategory(e.target.value)
        }),

        React.createElement("button", {
          className: "bg-blue-600 text-white px-3 py-2 rounded",
          onClick: () => {
            if (!newCategory) return;
            setCategories([...categories, newCategory]);
            setNewCategory("");
          }
        }, "Add"),

        React.createElement("div", { className: "mt-4" },
          categories.map((c,i) => {
            const name = typeof c === "object" ? c.name : c;
            return React.createElement("div", { key:i, className: "flex justify-between border-b py-1 items-center" },
              React.createElement("span", null, name),
              React.createElement("div", { className: "flex gap-2" },
                React.createElement("input", {
                  className: "border p-1 w-20",
                  placeholder: "Budget",
                  value: budgetMap[name] || "",
                  onChange: e => setBudgetMap({ ...budgetMap, [name]: e.target.value })
                }),
                React.createElement("button", {
                  className: "text-red-600",
                  onClick: () => setCategories(categories.filter((_,idx)=>idx!==i))
                }, "Delete")
              )
            );
          })
        )
      )
    );
  }

  // ================= DASHBOARD =================
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,

    React.createElement("div", { className: "mb-4" },
      React.createElement("input", {
        type: "month",
        className: "border p-2",
        value: selectedMonth,
        onChange: e => setSelectedMonth(e.target.value)
      })
    ),

    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "text-lg font-bold" }, "Monthly Total"),
      React.createElement("div", { className: "text-2xl text-green-600" }, `$${total.toFixed(2)}`)
    ),

    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, "Budget vs Actual"),
      budgetData.map(({cat, spent, budget}, i) =>
        React.createElement("div", { key: i, className: "flex justify-between" },
          React.createElement("span", null, cat),
          React.createElement("span", null, `$${spent.toFixed(2)} / $${budget || 0}`)
        )
      )
    ),

    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      React.createElement("div", { className: "font-bold" }, "Expenses"),
      filteredExpenses.map((e,i)=>
        React.createElement("div", { key:i, className:"flex justify-between border-b py-1" },
          React.createElement("span", null, e.store),
          React.createElement("span", null, `$${e.amount}`)
        )
      )
    )
  );
}

window.onload = () => {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(ExpenseTracker));
};

  </script>
