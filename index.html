<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
  // 🌐 PHASE 5: YEAR SUMMARY + STABILITY FIXES

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return d.toISOString().slice(0,7);
  });

  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);
  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });
  const [editExpenseIndex, setEditExpenseIndex] = useState(null);

  const [storeSuggestions, setStoreSuggestions] = useState([]);
  const normalizeStore = (s) => (s || "").trim();
  const keyStore = (s) => normalizeStore(s).toLowerCase();

  useEffect(() => {
    const savedExpenses = JSON.parse(localStorage.getItem("expenseAppData") || "[]");
    setExpenses(savedExpenses);
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));

    const uniqueStores = [...new Set(savedExpenses.map(e => e.store).filter(Boolean))];
    setStoreSuggestions(uniqueStores);
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));

    const map = {};
    expenses.forEach(e => {
      const name = normalizeStore(e.store);
      if (!name) return;
      const k = keyStore(name);
      if (!map[k]) map[k] = name;
    });
    setStoreSuggestions(Object.values(map));
  }, [expenses]);

  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) return alert("Fill all fields");

    const newItem = { ...form, store: normalizeStore(form.store), amount: parseFloat(form.amount) };

    if (editExpenseIndex !== null) {
      const updated = [...expenses];
      updated[editExpenseIndex] = newItem;
      setExpenses(updated);
      setEditExpenseIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setCurrentMonth(form.date.slice(0,7));
    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditExpenseIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const expensesForMonth = expenses.filter(e => (e.date || "").startsWith(currentMonth));
  const total = expensesForMonth.reduce((s, e) => s + e.amount, 0);

  const yearTotals = {};
  expenses.forEach(e => {
    if (!yearTotals[e.category]) yearTotals[e.category] = 0;
    yearTotals[e.category] += e.amount;
  });

  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
    React.createElement("button", { type: "button", onClick: () => setView("dashboard"), className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, "Dashboard"),
    React.createElement("button", { type: "button", onClick: () => setView("setup"), className: "bg-gray-700 text-white px-4 py-2 rounded shadow" }, "Setup"),
    React.createElement("button", { type: "button", onClick: () => setView("report"), className: "bg-green-600 text-white px-4 py-2 rounded shadow" }, "Vendor Report"),
    React.createElement("button", { type: "button", onClick: () => setView("categoryReport"), className: "bg-purple-600 text-white px-4 py-2 rounded shadow" }, "Category Report"),
    React.createElement("button", { type: "button", onClick: () => setView("yearSummary"), className: "bg-orange-600 text-white px-4 py-2 rounded shadow" }, "Year Summary")
  );

  // ===== SETUP (FULL RESTORE) =====
  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [newCard, setNewCard] = useState("");

  const [editCatIndex, setEditCatIndex] = useState(null);
  const [editCardIndex, setEditCardIndex] = useState(null);

  useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
  useEffect(() => localStorage.setItem("expenseCards", JSON.stringify(cards)), [cards]);

  const addCategory = () => {
    if (!newCategory.name || !newCategory.budget) return alert("Enter category + budget");

    if (editCatIndex !== null) {
      const updated = [...categories];
      updated[editCatIndex] = { name: newCategory.name, budget: parseFloat(newCategory.budget) };
      setCategories(updated);
      setEditCatIndex(null);
    } else {
      setCategories([...categories, { name: newCategory.name, budget: parseFloat(newCategory.budget) }]);
    }

    setNewCategory({ name: "", budget: "" });
  };

  const addCard = () => {
    if (!newCard) return alert("Enter card name");

    if (editCardIndex !== null) {
      const updated = [...cards];
      updated[editCardIndex] = newCard;
      setCards(updated);
      setEditCardIndex(null);
    } else {
      setCards([...cards, newCard]);
    }

    setNewCard("");
  };

  if (view === "setup") {
    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,

      // CATEGORIES
      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Categories"),

        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Name", value: newCategory.name, onChange: e => setNewCategory({ ...newCategory, name: e.target.value }) }),
        React.createElement("input", { className: "border p-2 mr-2", type: "number", placeholder: "Budget", value: newCategory.budget, onChange: e => setNewCategory({ ...newCategory, budget: e.target.value }) }),

        React.createElement("button", { onClick: addCategory, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCatIndex !== null ? "Update" : "Add"),

        categories.map((c, i) =>
          React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
            React.createElement("span", null, `${c.name} - $${c.budget}`),
            React.createElement("div", null,
              React.createElement("button", {
                onClick: () => {
                  setNewCategory({ name: c.name, budget: c.budget });
                  setEditCatIndex(i);
                },
                className: "text-blue-600 mr-2"
              }, "Edit"),
              React.createElement("button", {
                onClick: () => setCategories(categories.filter((_, idx) => idx !== i)),
                className: "text-red-600"
              }, "Delete")
            )
          )
        )
      ),

      // CARDS
      React.createElement("div", { className: "bg-white p-4 rounded shadow" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Cards"),

        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Card Name", value: newCard, onChange: e => setNewCard(e.target.value) }),

        React.createElement("button", { onClick: addCard, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCardIndex !== null ? "Update" : "Add"),

        cards.map((c, i) =>
          React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
            React.createElement("span", null, c),
            React.createElement("div", null,
              React.createElement("button", {
                onClick: () => {
                  setNewCard(c);
                  setEditCardIndex(i);
                },
                className: "text-blue-600 mr-2"
              }, "Edit"),
              React.createElement("button", {
                onClick: () => setCards(cards.filter((_, idx) => idx !== i)),
                className: "text-red-600"
              }, "Delete")
            )
          )
        )
      )
    );
  }

  // VENDOR REPORT
  if (view === "report") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.store]) map[e.store] = [];
      map[e.store].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Vendor Report"),
      Object.entries(map).map(([store, items]) =>
        React.createElement("div", { key: store },
          React.createElement("strong", null, store),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} $${i.amount}`))
        )
      )
    );
  }

  // CATEGORY REPORT
  if (view === "categoryReport") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.category]) map[e.category] = [];
      map[e.category].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Category Report"),
      Object.entries(map).map(([cat, items]) =>
        React.createElement("div", { key: cat },
          React.createElement("strong", null, cat),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} $${i.amount}`))
        )
      )
    );
  }

  // YEAR SUMMARY
  if (view === "yearSummary") {
    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Year Summary"),
      Object.entries(yearTotals).map(([cat, total]) =>
        React.createElement("div", { key: cat }, `${cat}: $${total.toFixed(2)}`)
      )
    );
  }

  // DASHBOARD
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,
    React.createElement("h1", { className: "text-2xl font-bold mb-4" }, "Dashboard"),

    // Month selector
    React.createElement("div", { className: "mb-4" },
      React.createElement("label", { className: "mr-2" }, "Month:"),
      React.createElement("input", {
        type: "month",
        value: currentMonth,
        onChange: e => setCurrentMonth(e.target.value),
        className: "border p-2"
      })
    ),

    React.createElement("div", { className: "mb-4 font-semibold" }, `Total: $${total}`),

    // CATEGORY BARS (restored)
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      categories.map(cat => {
        const spent = expensesForMonth.filter(e => e.category === cat.name).reduce((s, e) => s + e.amount, 0);
        const percent = cat.budget ? (spent / cat.budget) * 100 : 0;

        return React.createElement("div", { key: cat.name, className: "mb-3" },
          React.createElement("div", { className: "flex justify-between text-sm" },
            React.createElement("span", null, cat.name),
            React.createElement("span", null, `$${spent} / $${cat.budget}`)
          ),
          React.createElement("div", { className: "w-full bg-gray-200 h-2 rounded" },
            React.createElement("div", {
              className: percent > 100 ? "bg-red-500 h-2 rounded" : percent > 80 ? "bg-yellow-400 h-2 rounded" : "bg-green-500 h-2 rounded",
              style: { width: Math.min(percent, 100) + "%" }
            })
          )
        );
      })
    ),

    // FORM
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4 space-x-2" },
      React.createElement("input", { className: "border p-2", type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement("input", {
        className: "border p-2",
        placeholder: "Store",
        list: "store-list",
        value: form.store,
        onChange: e => {
          const val = e.target.value;
          const match = storeSuggestions.find(s => keyStore(s).startsWith(keyStore(val)));
          setForm({ ...form, store: match || val });
        }
      }),
      React.createElement("datalist", { id: "store-list" },
        storeSuggestions.map((s, i) => React.createElement("option", { key: i, value: s }))
      ),
      React.createElement("input", { className: "border p-2", type: "number", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),

      React.createElement("select", { className: "border p-2", value: form.category, onChange: e => setForm({ ...form, category: e.target.value }) },
        React.createElement("option", { value: "" }, "Category"),
        categories.map(c => React.createElement("option", { key: c.name }, c.name))
      ),

      React.createElement("select", { className: "border p-2", value: form.card, onChange: e => setForm({ ...form, card: e.target.value }) },
        React.createElement("option", { value: "" }, "Card"),
        cards.map(c => React.createElement("option", { key: c }, c))
      ),

      React.createElement("button", { onClick: handleSubmit, className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, editExpenseIndex !== null ? "Update" : "Add")
    ),

    // LIST
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      expensesForMonth.map((e, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${e.date} | ${e.store} | $${e.amount}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => editExpense(i), className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => deleteExpense(i), className: "text-red-600" }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};

    </script>
  </body>
</html>
