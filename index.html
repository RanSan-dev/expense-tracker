<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
</head>

<body>
  <div id="root"></div>

  <script>
  const { useState, useEffect } = React;

  function ExpenseTracker() {
    const [view, setView] = useState("dashboard");

    const [categories, setCategories] = useState(() => {
      const raw = JSON.parse(localStorage.getItem("expenseCategories") || "[]");
      return raw.map(c => (typeof c === "object" ? c.name : c));
    });

    const [budgets, setBudgets] = useState(() => JSON.parse(localStorage.getItem("expenseBudgets") || "{}"));
    const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
    const [storeList, setStoreList] = useState(() => JSON.parse(localStorage.getItem("expenseStores") || "[]"));

    const [newCategory, setNewCategory] = useState("");
    const [form, setForm] = useState({ date: "", store: "", amount: "", category: "" });
    const [editIndex, setEditIndex] = useState(null);
    const [preview, setPreview] = useState([]);

    const [selectedMonth, setSelectedMonth] = useState(() => {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    });

    // RECURRING (Auto Debits)
    const [ccDebits, setCcDebits] = useState(() => JSON.parse(localStorage.getItem("ccDebits")||"[]"));
    const [bankDebits, setBankDebits] = useState(() => JSON.parse(localStorage.getItem("bankDebits")||"[]"));
    const [ccForm, setCcForm] = useState({ name:"", amount:"", day:"" });
    const [bankForm, setBankForm] = useState({ name:"", amount:"", day:"" });

    useEffect(()=>localStorage.setItem("ccDebits", JSON.stringify(ccDebits)), [ccDebits]);
    useEffect(()=>localStorage.setItem("bankDebits", JSON.stringify(bankDebits)), [bankDebits]);

    useEffect(() => localStorage.setItem("expenseAppData", JSON.stringify(expenses)), [expenses]);
    useEffect(() => localStorage.setItem("expenseStores", JSON.stringify(storeList)), [storeList]);
    useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
    useEffect(() => localStorage.setItem("expenseBudgets", JSON.stringify(budgets)), [budgets]);

    const rememberStore = (store) => {
      const s = store.trim();
      if (!s) return;
      setStoreList(prev => prev.some(x => x.toLowerCase() === s.toLowerCase()) ? prev : [...prev, s]);
    };

    const handleSubmit = () => {
      if (!form.date || !form.store || !form.amount) return;

      rememberStore(form.store);

      if (editIndex !== null) {
        const updated = [...expenses];
        updated[editIndex] = { ...form, amount: parseFloat(form.amount) };
        setExpenses(updated);
        setEditIndex(null);
      } else {
        setExpenses([...expenses, { ...form, amount: parseFloat(form.amount) }]);
      }

      setForm({ date: "", store: "", amount: "", category: "" });
    };

    const filteredExpenses = expenses.filter(e => e.date && e.date.startsWith(selectedMonth));
    const total = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

    const nav = React.createElement("div", { className: "flex gap-4 mb-6" },
      React.createElement("button", { className: "bg-blue-600 text-white px-4 py-2 rounded", onClick: () => setView("dashboard") }, "Dashboard"),
      React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("reports") }, "Reports"),
      React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("setup") }, "Setup"),
      React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("autodebits") }, "Auto Debits")
    );

    if (view === "reports") {
      const categoryTotals = filteredExpenses.reduce((acc, e) => {
        const cat = e.category || "Uncategorized";
        acc[cat] = (acc[cat] || 0) + e.amount;
        return acc;
      }, {});

      const totalBudget = Object.values(budgets).reduce((a,b)=>a+parseFloat(b||0),0);
      const days = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();
      const today = new Date().getDate();

      const expectedDaily = totalBudget / (days || 1);
      const actualDaily = total / (today || 1);

      return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
        nav,
        React.createElement("div", { className: "mb-6" },
          React.createElement("div", { className: "text-2xl font-bold" }, `Monthly Report - ${selectedMonth}`),
          React.createElement("div", { className: "text-gray-500" }, "Clean summary for easy sharing")
        ),
        React.createElement("div", { className: "grid grid-cols-2 gap-4 mb-6" },
          React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
            React.createElement("div", { className: "text-sm text-gray-500" }, "Total Spent"),
            React.createElement("div", { className: "text-2xl font-bold text-green-600" }, `$${total.toFixed(2)}`)
          ),
          React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
            React.createElement("div", { className: "text-sm text-gray-500" }, "Budget"),
            React.createElement("div", { className: "text-2xl font-bold text-blue-600" }, `$${totalBudget.toFixed(2)}`)
          )
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-6" },
          React.createElement("div", { className: "font-bold mb-2" }, "Daily Pace"),
          React.createElement("div", { className: "flex justify-between" },
            React.createElement("span", null, `Expected: $${expectedDaily.toFixed(2)}`),
            React.createElement("span", null, `Actual: $${actualDaily.toFixed(2)}`)
          )
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-6" },
          React.createElement("div", { className: "font-bold mb-3" }, "Spending by Category"),
          Object.entries(categoryTotals).map(([cat, amt], i) => {
            const budget = parseFloat(budgets[cat] || 0);
            const percent = total ? (amt/total)*100 : 0;
            const over = amt > budget && budget > 0;

            return React.createElement("div", { key:i, className:"mb-3" },
              React.createElement("div", { className:"flex justify-between text-sm mb-1" },
                React.createElement("span", { className:"font-medium" }, cat),
                React.createElement("span", { className: over ? "text-red-600" : "text-green-600" }, `$${amt.toFixed(2)} / $${budget.toFixed(0)}`)
              ),
              React.createElement("div", { className:"w-full bg-gray-200 h-3 rounded" },
                React.createElement("div", {
                  className: over ? "bg-red-500 h-3 rounded" : "bg-green-500 h-3 rounded",
                  style:{ width: `${percent}%` }
                })
              )
            );
          })
        ),
        React.createElement("div", { className:"flex gap-3" },
        React.createElement("button", {
          className: "bg-gradient-to-r from-red-500 to-pink-500 text-white px-6 py-3 rounded-2xl shadow",
          onClick: () => {
            const subject = `Expense Report ${selectedMonth}`;

            const pad = (s, n) => (s + ' '.repeat(n)).slice(0, n);

            const rows = Object.entries(categoryTotals).map(([cat, amt]) => {
              const budget = parseFloat(budgets[cat] || 0);
              const pct = budget ? (amt / budget) * 100 : 0;
              const totalBars = 20;
              const filled = Math.round((Math.min(pct,100)/100)*totalBars);
              const bar = `[${"█".repeat(filled)}${"░".repeat(totalBars-filled)}] ${pct.toFixed(0)}%`;
              return `${pad(cat,16)}  ${pad(`$${amt.toFixed(2)} / $${(budget||0)}`,20)}  ${bar}`;
            });

            const prettyLines = [
              "===============================",
              `MONTHLY EXPENSE REPORT (${selectedMonth})`,
              "===============================",
              "",
              `${pad('TOTAL:',10)} $${total.toFixed(2)}`,
              `${pad('BUDGET:',10)} $${totalBudget.toFixed(2)}`,
              "",
              "------ DAILY PACE ------",
              `${pad('Expected:',10)} $${expectedDaily.toFixed(2)}`,
              `${pad('Actual:',10)} $${actualDaily.toFixed(2)}`,
              "",
              "------ CATEGORY BREAKDOWN ------",
              `${pad('Category',16)}  ${pad('Amount',20)}  Progress`,
              "-----------------------------------------------",
              ...rows,
              "",
              "-------------------------------",
              "Sent from Expense Tracker"
            ];

            const body = encodeURIComponent(prettyLines.join("\n"));

            window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${body}`, "_blank");
          }
        }, "Send Styled Report ✉️"),

        React.createElement("button", {
          className: "bg-blue-600 text-white px-6 py-3 rounded-2xl shadow",
          onClick: () => {
            const reportWindow = window.open("", "_blank");
            reportWindow.document.write(`
              <html>
              <head>
                <title>Expense Report</title>
                <style>
                  body { font-family: Arial; padding:20px; }
                  h2 { color:#333; }
                  .section { margin-bottom:20px; }
                </style>
              </head>
              <body>
                <h2>📊 Monthly Expense Report (${selectedMonth})</h2>
                <div class="section"><strong>Total:</strong> $${total.toFixed(2)}</div>
                <div class="section"><strong>Budget:</strong> $${totalBudget.toFixed(2)}</div>
                <div class="section">
                  <h3>Categories</h3>
                  ${Object.entries(categoryTotals).map(([cat, amt]) =>
                    `<div>${cat}: $${amt.toFixed(2)}</div>`
                  ).join("")}
                </div>
              </body>
              </html>
            `);
            reportWindow.document.close();
            reportWindow.print();
          }
        }, "Download / Print PDF")
      )
      );
    }

    if (view === "setup") {
      return React.createElement("div", { className: "p-6" },
        nav,

        React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
          React.createElement("div", { className: "font-bold mb-2" }, "Add Category"),
          React.createElement("input", {
            value: newCategory,
            onChange: e => setNewCategory(e.target.value),
            placeholder: "Category name",
            className: "border p-2 mr-2"
          }),
          React.createElement("button", {
            className: "bg-blue-600 text-white px-3 py-2 rounded",
            onClick: () => {
              if (!newCategory) return;
              if (categories.includes(newCategory)) return;
              setCategories([...categories, newCategory]);
              setNewCategory("");
            }
          }, "Add")
        ),

        React.createElement("div", { className: "bg-white p-4 rounded shadow" },
          React.createElement("div", { className: "font-bold mb-2" }, "Categories & Budgets"),
          categories.map((c,i) =>
            React.createElement("div", { key:i, className:"flex justify-between items-center mb-2" },
              React.createElement("span", null, c),
              React.createElement("div", { className:"flex gap-2" },
                React.createElement("input", {
                  placeholder: "Budget",
                  value: budgets[c] || "",
                  onChange: e => setBudgets({ ...budgets, [c]: e.target.value }),
                  className:"border p-1 w-24"
                }),
                React.createElement("button", {
                  className:"text-red-600",
                  onClick: () => setCategories(categories.filter((_,idx)=>idx!==i))
                }, "Delete")
              )
            )
          )
        )
      );
    }

    // AUTO DEBITS PAGE
    if (view === "autodebits") {
      const ccTotal = ccDebits.reduce((s,i)=>s+parseFloat(i.amount||0),0);
      const bankTotal = bankDebits.reduce((s,i)=>s+parseFloat(i.amount||0),0);

      return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
        nav,

        // CREDIT CARD
        React.createElement("div", { className:"bg-white p-4 rounded-2xl shadow mb-6" },
          React.createElement("div", { className:"font-bold mb-2" }, "Credit Card Monthly Debits"),
          React.createElement("div", { className:"mb-2" }, `Total: $${ccTotal.toFixed(2)}`),

          React.createElement("div", { className:"mb-3" },
            React.createElement("input", { placeholder:"Name", value:ccForm.name, onChange:e=>setCcForm({...ccForm,name:e.target.value}), className:"border p-2 mr-2" }),
            React.createElement("input", { placeholder:"Amount", value:ccForm.amount, onChange:e=>setCcForm({...ccForm,amount:e.target.value}), className:"border p-2 mr-2" }),
            React.createElement("input", { placeholder:"Day", value:ccForm.day, onChange:e=>setCcForm({...ccForm,day:e.target.value}), className:"border p-2 mr-2 w-20" }),
            React.createElement("button", { className:"bg-blue-600 text-white px-3 py-2 rounded", onClick:()=>{
              if(!ccForm.name||!ccForm.amount) return;
              setCcDebits([...ccDebits, {...ccForm, amount:parseFloat(ccForm.amount)}]);
              setCcForm({name:"",amount:"",day:""});
            }}, "Add")
          ),

          ccDebits.map((d,i)=>React.createElement("div", { key:i, className:"flex justify-between border-b py-1" },
            React.createElement("span", null, `${d.name} - $${d.amount} (Day ${d.day||'-'})`),
            React.createElement("button", { className:"text-red-600", onClick:()=>setCcDebits(ccDebits.filter((_,idx)=>idx!==i)) }, "Delete")
          ))
        ),

        // BANK
        React.createElement("div", { className:"bg-white p-4 rounded-2xl shadow" },
          React.createElement("div", { className:"font-bold mb-2" }, "Bank Account Monthly Debits"),
          React.createElement("div", { className:"mb-2" }, `Total: $${bankTotal.toFixed(2)}`),

          React.createElement("div", { className:"mb-3" },
            React.createElement("input", { placeholder:"Name", value:bankForm.name, onChange:e=>setBankForm({...bankForm,name:e.target.value}), className:"border p-2 mr-2" }),
            React.createElement("input", { placeholder:"Amount", value:bankForm.amount, onChange:e=>setBankForm({...bankForm,amount:e.target.value}), className:"border p-2 mr-2" }),
            React.createElement("input", { placeholder:"Day", value:bankForm.day, onChange:e=>setBankForm({...bankForm,day:e.target.value}), className:"border p-2 mr-2 w-20" }),
            React.createElement("button", { className:"bg-blue-600 text-white px-3 py-2 rounded", onClick:()=>{
              if(!bankForm.name||!bankForm.amount) return;
              setBankDebits([...bankDebits, {...bankForm, amount:parseFloat(bankForm.amount)}]);
              setBankForm({name:"",amount:"",day:""});
            }}, "Add")
          ),

          bankDebits.map((d,i)=>React.createElement("div", { key:i, className:"flex justify-between border-b py-1" },
            React.createElement("span", null, `${d.name} - $${d.amount} (Day ${d.day||'-'})`),
            React.createElement("button", { className:"text-red-600", onClick:()=>setBankDebits(bankDebits.filter((_,idx)=>idx!==i)) }, "Delete")
          ))
        )
      );
    }

    // DASHBOARD (ULTIMATE)
    const todayStr = new Date().toISOString().slice(0,10);
    const todayTotal = filteredExpenses.filter(e=>e.date===todayStr).reduce((s,e)=>s+e.amount,0);

    const categoryTotalsDash = filteredExpenses.reduce((acc, e) => {
      const cat = e.category || "Uncategorized";
      acc[cat] = (acc[cat] || 0) + e.amount;
      return acc;
    }, {});

    const topCategory = Object.entries(categoryTotalsDash).sort((a,b)=>b[1]-a[1])[0];

    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,

      // Month
      React.createElement("input", {
        type: "month",
        value: selectedMonth,
        onChange: e => setSelectedMonth(e.target.value),
        className: "border p-2 mb-4"
      }),

      // TOP CARDS
      React.createElement("div", { className: "grid grid-cols-3 gap-4 mb-6" },
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
          React.createElement("div", { className: "text-sm text-gray-500" }, "Total"),
          React.createElement("div", { className: "text-2xl font-bold" }, `$${total.toFixed(2)}`)
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
          React.createElement("div", { className: "text-sm text-gray-500" }, "Today"),
          React.createElement("div", { className: "text-2xl font-bold text-green-600" }, `$${todayTotal.toFixed(2)}`)
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
          React.createElement("div", { className: "text-sm text-gray-500" }, "Top Category"),
          React.createElement("div", { className: "text-lg font-bold" }, topCategory ? `${topCategory[0]} ($${topCategory[1].toFixed(2)})` : "—")
        )
      ),

      // FORM (top)
      React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-4" },
        React.createElement("input", { type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }), className: "border p-2 mr-2" }),
        React.createElement("input", { list: "stores", placeholder: "Store", value: form.store, onChange: e => setForm({ ...form, store: e.target.value }), className: "border p-2 mr-2" }),
        React.createElement("datalist", { id: "stores" }, storeList.map((s,i)=>React.createElement("option", { key:i, value:s }))),
        React.createElement("input", { placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }), className: "border p-2 mr-2" }),
        React.createElement("select", {
          value: form.category,
          onChange: e => setForm({ ...form, category: e.target.value }),
          className: "border p-2 mr-2"
        },
          React.createElement("option", { value: "" }, "Category"),
          categories.map((c,i)=>React.createElement("option", { key:i, value:c }, c))
        ),
        React.createElement("button", { onClick: handleSubmit, className: "bg-green-600 text-white px-3 py-2 rounded" }, editIndex !== null ? "Update" : "Add")
      ),

      // CSV IMPORT
      React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-4" },
        React.createElement("div", { className: "font-bold mb-2" }, "Import CSV"),
        React.createElement("input", {
          type: "file",
          accept: ".csv",
          onChange: (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
              const rows = evt.target.result.split("\n").slice(1).filter(r => r.trim());
              const items = rows.map(r => {
                const [date, store, amount] = r.split(",");
                if (!date || !store || !amount) return null;
                return { date: date.trim(), store: store.trim(), amount: Math.abs(parseFloat(amount)), category: "" };
              }).filter(Boolean);
              setPreview(items);
            };
            reader.readAsText(file);
          }
        }),

        preview.length > 0 && React.createElement("div", { className: "mt-3" },
          preview.slice(0,5).map((p,i)=>React.createElement("div", { key:i, className:"text-sm" }, `${p.date} | ${p.store} | $${p.amount}`)),
          React.createElement("button", {
            className: "mt-2 bg-blue-600 text-white px-3 py-1 rounded",
            onClick: () => {
              setExpenses([...expenses, ...preview]);
              preview.forEach(p => rememberStore(p.store));
              setPreview([]);
            }
          }, "Submit Import")
        )
      ),

      // CATEGORY GRAPH
      React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-4" },
        React.createElement("div", { className: "font-bold mb-2" }, "Spending by Category"),
        Object.entries(categoryTotalsDash).map(([cat, amt], i) =>
          React.createElement("div", { key:i, className:"mb-2" },
            React.createElement("div", { className:"flex justify-between text-sm" },
              React.createElement("span", null, cat),
              React.createElement("span", null, `$${amt.toFixed(2)}`)
            ),
            React.createElement("div", { className:"w-full bg-gray-200 h-3 rounded" },
              React.createElement("div", {
                className:"bg-blue-500 h-3 rounded",
                style:{ width: `${total ? (amt/total)*100 : 0}%` }
              })
            )
          )
        )
      ),

      // SMART ALERTS
      React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-4" },
        React.createElement("div", { className: "font-bold mb-2" }, "Alerts"),
        categories.map((cat,i)=>{
          const spent = (categoryTotalsDash[cat]||0);
          const budget = parseFloat(budgets[cat]||0);
          if(!budget) return null;
          const percent = (spent/budget)*100;
          if(percent>=100){
            return React.createElement("div",{key:i,className:"text-red-600 text-sm"},`🔴 ${cat} over budget`);
          }
          if(percent>=80){
            return React.createElement("div",{key:i,className:"text-yellow-600 text-sm"},`🟠 ${cat} at ${percent.toFixed(0)}%`);
          }
          return null;
        })
      ),

      // LIST WITH DATES
      React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
        filteredExpenses.map((e,i)=>
          React.createElement("div", { key:i, className:"flex justify-between border-b py-1" },
            React.createElement("span", null, `${e.date} | ${e.store} - $${e.amount} ${e.category ? '('+e.category+')' : ''}`),
            React.createElement("div", { className:"flex gap-2" },
              React.createElement("button", { className:"text-blue-600", onClick:()=>{ setForm(e); setEditIndex(i); } }, "Edit"),
              React.createElement("button", { className:"text-red-600", onClick:()=>{ setExpenses(expenses.filter((_,idx)=>idx!==i)); } }, "Delete")
            )
          )
        )
      )
    );
  }

  window.onload = () => {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ExpenseTracker));
  };
  </script>
</body>
</html>
