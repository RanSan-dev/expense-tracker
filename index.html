<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
   // 🌐 PHASE 2: FULL SETUP / CONTROL PANEL ADDED

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", vendor: "", amount: "", category: "", type: "card" });
  const [editingIndex, setEditingIndex] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem("expenseAppData");
    if (saved) setExpenses(JSON.parse(saved));

    const savedCats = localStorage.getItem("expenseCategories");
    if (savedCats) setCategories(JSON.parse(savedCats));
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));
  }, [expenses]);

  useEffect(() => {
    localStorage.setItem("expenseCategories", JSON.stringify(categories));
  }, [categories]);

  const addCategory = () => {
    if (!newCategory.name || !newCategory.budget) return;
    if (categories.length >= 10) {
      alert("Max 10 categories");
      return;
    }
    setCategories([...categories, { name: newCategory.name, budget: parseFloat(newCategory.budget) }]);
    setNewCategory({ name: "", budget: "" });
  };

  const deleteCategory = (i) => {
    const updated = [...categories];
    updated.splice(i, 1);
    setCategories(updated);
  };

  const handleSubmit = () => {
    if (!form.date || !form.vendor || !form.amount || !form.category) {
      alert("Fill all fields");
      return;
    }

    const newItem = { ...form, amount: parseFloat(form.amount) };

    if (editingIndex !== null) {
      const updated = [...expenses];
      updated[editingIndex] = newItem;
      setExpenses(updated);
      setEditingIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setForm({ date: "", vendor: "", amount: "", category: "", type: "card" });
  };

  const total = expenses.reduce((sum, e) => sum + e.amount, 0);

  const categoryTotals = categories.map(cat => {
    const total = expenses.filter(e => e.category === cat.name).reduce((sum, e) => sum + e.amount, 0);
    return { ...cat, total };
  });

  // 🧠 NAVIGATION
  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
    React.createElement("button", { onClick: () => setView("dashboard"), className: "bg-blue-500 text-white px-3 py-1 rounded" }, "Dashboard"),
    React.createElement("button", { onClick: () => setView("setup"), className: "bg-gray-700 text-white px-3 py-1 rounded" }, "Setup")
  );

  // ⚙️ SETUP PAGE
  if (view === "setup") {
    return React.createElement("div", { className: "p-6" },
      nav,
      React.createElement("h2", { className: "text-2xl font-bold mb-4" }, "Setup Categories & Budgets"),

      React.createElement("div", { className: "mb-4" },
        React.createElement("input", {
          placeholder: "Category Name",
          value: newCategory.name,
          onChange: e => setNewCategory({ ...newCategory, name: e.target.value })
        }),
        React.createElement("input", {
          type: "number",
          placeholder: "Budget",
          value: newCategory.budget,
          onChange: e => setNewCategory({ ...newCategory, budget: e.target.value })
        }),
        React.createElement("button", { onClick: addCategory, className: "ml-2 bg-green-500 text-white px-3 py-1" }, "Add")
      ),

      categories.map((c, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${c.name} - $${c.budget}`),
          React.createElement("button", { onClick: () => deleteCategory(i), className: "text-red-500" }, "Delete")
        )
      )
    );
  }

  // 📊 DASHBOARD
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },

    nav,

    React.createElement("h1", { className: "text-3xl font-bold mb-6" }, "💰 Expense Tracker"),

    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-6" },
      React.createElement("h2", { className: "mb-3 font-semibold" }, "Category Budgets"),
      categoryTotals.map(c => {
        const percent = c.budget ? (c.total / c.budget) * 100 : 0;
        return React.createElement("div", { key: c.name, className: "mb-2" },
          React.createElement("div", { className: "flex justify-between text-sm" },
            React.createElement("span", null, c.name),
            React.createElement("span", null, `$${c.total} / $${c.budget}`)
          ),
          React.createElement("div", { className: "w-full bg-gray-200 h-2 rounded" },
            React.createElement("div", {
              className: percent > 100 ? "bg-red-500 h-2" : percent > 80 ? "bg-yellow-400 h-2" : "bg-green-500 h-2",
              style: { width: Math.min(percent, 100) + "%" }
            })
          )
        );
      })
    ),

    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-6" },
      React.createElement("h2", null, "Add Expense"),
      React.createElement("input", { type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement("input", { placeholder: "Vendor", value: form.vendor, onChange: e => setForm({ ...form, vendor: e.target.value }) }),
      React.createElement("input", { type: "number", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),
      React.createElement("select", { value: form.category, onChange: e => setForm({ ...form, category: e.target.value }) },
        React.createElement("option", { value: "" }, "Category"),
        categories.map(c => React.createElement("option", { key: c.name }, c.name))
      ),
      React.createElement("button", { onClick: handleSubmit, className: "ml-2 bg-blue-500 text-white px-3 py-1" }, "Add")
    ),

    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      React.createElement("h2", null, "Transactions"),
      expenses.map((e, i) =>
        React.createElement("div", { key: i }, `${e.date} | ${e.vendor} | $${e.amount}`)
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};


    </script>
  </body>
</html>
