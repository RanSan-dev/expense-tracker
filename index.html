<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
</head>

<body>
  <div id="root"></div>

  <script>
  const { useState, useEffect } = React;

  function ExpenseTracker() {
    const [view, setView] = useState("dashboard");

    const [categories, setCategories] = useState(() => {
      const raw = JSON.parse(localStorage.getItem("expenseCategories") || "[]");
      return raw.map(c => (typeof c === "object" ? c.name : c));
    });

    const [budgets, setBudgets] = useState(() => JSON.parse(localStorage.getItem("expenseBudgets") || "{}"));
    const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
    const [storeList, setStoreList] = useState(() => JSON.parse(localStorage.getItem("expenseStores") || "[]"));

    const [newCategory, setNewCategory] = useState("");
    const [form, setForm] = useState({ date: "", store: "", amount: "", category: "" });
    const [editIndex, setEditIndex] = useState(null);
    const [preview, setPreview] = useState([]);

    const [selectedMonth, setSelectedMonth] = useState(() => {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    });

    useEffect(() => localStorage.setItem("expenseAppData", JSON.stringify(expenses)), [expenses]);
    useEffect(() => localStorage.setItem("expenseStores", JSON.stringify(storeList)), [storeList]);
    useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
    useEffect(() => localStorage.setItem("expenseBudgets", JSON.stringify(budgets)), [budgets]);

    const rememberStore = (store) => {
      const s = store.trim();
      if (!s) return;
      setStoreList(prev => prev.some(x => x.toLowerCase() === s.toLowerCase()) ? prev : [...prev, s]);
    };

    const handleSubmit = () => {
      if (!form.date || !form.store || !form.amount) return;

      rememberStore(form.store);

      if (editIndex !== null) {
        const updated = [...expenses];
        updated[editIndex] = { ...form, amount: parseFloat(form.amount) };
        setExpenses(updated);
        setEditIndex(null);
      } else {
        setExpenses([...expenses, { ...form, amount: parseFloat(form.amount) }]);
      }

      setForm({ date: "", store: "", amount: "", category: "" });
    };

    const filteredExpenses = expenses.filter(e => e.date && e.date.startsWith(selectedMonth));
    const total = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

    const nav = React.createElement("div", { className: "flex gap-4 mb-6" },
      React.createElement("button", { className: "bg-blue-600 text-white px-4 py-2 rounded", onClick: () => setView("dashboard") }, "Dashboard"),
      React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("reports") }, "Reports"),
      React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("setup") }, "Setup")
    );

    if (view === "reports") {
      const categoryTotals = filteredExpenses.reduce((acc, e) => {
        const cat = e.category || "Uncategorized";
        acc[cat] = (acc[cat] || 0) + e.amount;
        return acc;
      }, {});

      const totalBudget = Object.values(budgets).reduce((a,b)=>a+parseFloat(b||0),0);
      const days = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();
      const today = new Date().getDate();

      const expectedDaily = totalBudget / (days || 1);
      const actualDaily = total / (today || 1);

      return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
        nav,
        React.createElement("div", { className: "mb-6" },
          React.createElement("div", { className: "text-2xl font-bold" }, `Monthly Report - ${selectedMonth}`),
          React.createElement("div", { className: "text-gray-500" }, "Clean summary for easy sharing")
        ),
        React.createElement("div", { className: "grid grid-cols-2 gap-4 mb-6" },
          React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
            React.createElement("div", { className: "text-sm text-gray-500" }, "Total Spent"),
            React.createElement("div", { className: "text-2xl font-bold text-green-600" }, `$${total.toFixed(2)}`)
          ),
          React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow" },
            React.createElement("div", { className: "text-sm text-gray-500" }, "Budget"),
            React.createElement("div", { className: "text-2xl font-bold text-blue-600" }, `$${totalBudget.toFixed(2)}`)
          )
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-6" },
          React.createElement("div", { className: "font-bold mb-2" }, "Daily Pace"),
          React.createElement("div", { className: "flex justify-between" },
            React.createElement("span", null, `Expected: $${expectedDaily.toFixed(2)}`),
            React.createElement("span", null, `Actual: $${actualDaily.toFixed(2)}`)
          )
        ),
        React.createElement("div", { className: "bg-white p-4 rounded-2xl shadow mb-6" },
          React.createElement("div", { className: "font-bold mb-3" }, "Spending by Category"),
          Object.entries(categoryTotals).map(([cat, amt], i) => {
            const budget = parseFloat(budgets[cat] || 0);
            const percent = total ? (amt/total)*100 : 0;
            const over = amt > budget && budget > 0;

            return React.createElement("div", { key:i, className:"mb-3" },
              React.createElement("div", { className:"flex justify-between text-sm mb-1" },
                React.createElement("span", { className:"font-medium" }, cat),
                React.createElement("span", { className: over ? "text-red-600" : "text-green-600" }, `$${amt.toFixed(2)} / $${budget.toFixed(0)}`)
              ),
              React.createElement("div", { className:"w-full bg-gray-200 h-3 rounded" },
                React.createElement("div", {
                  className: over ? "bg-red-500 h-3 rounded" : "bg-green-500 h-3 rounded",
                  style:{ width: `${percent}%` }
                })
              )
            );
          })
        ),
        React.createElement("button", {
          className: "bg-gradient-to-r from-red-500 to-pink-500 text-white px-6 py-3 rounded-2xl shadow",
          onClick: () => {
            const subject = `Expense Report ${selectedMonth}`;
            const summary = Object.entries(categoryTotals)
              .map(([cat, amt]) => `${cat}: $${amt.toFixed(2)} / $${(budgets[cat]||0)}`)
              .join("\\n");
            const body = encodeURIComponent(
              `Monthly Report (${selectedMonth})\\n\\nTotal: $${total.toFixed(2)}\\nBudget: $${totalBudget.toFixed(2)}\\n\\n${summary}\\n\\nDaily: Expected $${expectedDaily.toFixed(2)} | Actual $${actualDaily.toFixed(2)}`
            );
            window.open(`https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${body}`, "_blank");
          }
        }, "Send Beautiful Report ✉️")
      );
    }

    if (view === "setup") {
      return React.createElement("div", { className: "p-6" },
        nav,

        React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
          React.createElement("div", { className: "font-bold mb-2" }, "Add Category"),
          React.createElement("input", {
            value: newCategory,
            onChange: e => setNewCategory(e.target.value),
            placeholder: "Category name",
            className: "border p-2 mr-2"
          }),
          React.createElement("button", {
            className: "bg-blue-600 text-white px-3 py-2 rounded",
            onClick: () => {
              if (!newCategory) return;
              if (categories.includes(newCategory)) return;
              setCategories([...categories, newCategory]);
              setNewCategory("");
            }
          }, "Add")
        ),

        React.createElement("div", { className: "bg-white p-4 rounded shadow" },
          React.createElement("div", { className: "font-bold mb-2" }, "Categories & Budgets"),
          categories.map((c,i) =>
            React.createElement("div", { key:i, className:"flex justify-between items-center mb-2" },
              React.createElement("span", null, c),
              React.createElement("div", { className:"flex gap-2" },
                React.createElement("input", {
                  placeholder: "Budget",
                  value: budgets[c] || "",
                  onChange: e => setBudgets({ ...budgets, [c]: e.target.value }),
                  className:"border p-1 w-24"
                }),
                React.createElement("button", {
                  className:"text-red-600",
                  onClick: () => setCategories(categories.filter((_,idx)=>idx!==i))
                }, "Delete")
              )
            )
          )
        )
      );
    }

    // DASHBOARD
    return React.createElement("div", { className: "p-6" },
      nav,
      React.createElement("input", {
        type: "month",
        value: selectedMonth,
        onChange: e => setSelectedMonth(e.target.value),
        className: "border p-2 mb-4"
      }),

      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("div", { className: "font-bold" }, "Total"),
        React.createElement("div", null, `$${total.toFixed(2)}`)
      )
    );
  }

  window.onload = () => {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ExpenseTracker));
  };
  </script>
</body>
</html>
