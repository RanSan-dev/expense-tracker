<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
   const { useState, useEffect } = React;

function ExpenseTracker() {
  const [expenses, setExpenses] = useState([]);
  const [form, setForm] = useState({ date: "", vendor: "", amount: "", category: "", type: "card" });
  const [editingIndex, setEditingIndex] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem("expenseAppData");
    if (saved) setExpenses(JSON.parse(saved));
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));
  }, [expenses]);

  const handleSubmit = () => {
    if (!form.date || !form.vendor || !form.amount || !form.category) {
      alert("Fill all fields");
      return;
    }

    const newItem = { ...form, amount: parseFloat(form.amount) };

    if (editingIndex !== null) {
      const updated = [...expenses];
      updated[editingIndex] = newItem;
      setExpenses(updated);
      setEditingIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setForm({ date: "", vendor: "", amount: "", category: "", type: "card" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditingIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const total = expenses.reduce((sum, e) => sum + e.amount, 0);

  const cashTotal = expenses.filter(e => e.type === "cash").reduce((s, e) => s + e.amount, 0);
  const cardTotal = expenses.filter(e => e.type === "card").reduce((s, e) => s + e.amount, 0);

  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },

    React.createElement("h1", { className: "text-3xl font-bold mb-6" }, "💰 Expense Tracker"),

    // Summary cards
    React.createElement("div", { className: "grid grid-cols-3 gap-4 mb-6" },
      React.createElement("div", { className: "bg-white p-4 rounded shadow" }, "Total: $" + total),
      React.createElement("div", { className: "bg-white p-4 rounded shadow" }, "Card: $" + cardTotal),
      React.createElement("div", { className: "bg-white p-4 rounded shadow" }, "Cash: $" + cashTotal)
    ),

    // Form
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-6" },
      React.createElement("h2", { className: "mb-3 font-semibold" }, editingIndex !== null ? "Edit Expense" : "Add Expense"),

      React.createElement("div", { className: "grid grid-cols-2 gap-3" },
        React.createElement("input", {
          type: "date",
          value: form.date,
          onChange: e => setForm({ ...form, date: e.target.value })
        }),
        React.createElement("input", {
          placeholder: "Vendor",
          value: form.vendor,
          onChange: e => setForm({ ...form, vendor: e.target.value })
        }),
        React.createElement("input", {
          type: "number",
          placeholder: "Amount",
          value: form.amount,
          onChange: e => setForm({ ...form, amount: e.target.value })
        }),
        React.createElement("input", {
          placeholder: "Category",
          value: form.category,
          onChange: e => setForm({ ...form, category: e.target.value })
        }),
        React.createElement("select", {
          value: form.type,
          onChange: e => setForm({ ...form, type: e.target.value })
        },
          React.createElement("option", { value: "card" }, "Card"),
          React.createElement("option", { value: "cash" }, "Cash")
        )
      ),

      React.createElement("button", {
        onClick: handleSubmit,
        className: "mt-3 bg-blue-500 text-white px-4 py-2 rounded"
      }, editingIndex !== null ? "Update" : "Add Expense")
    ),

    // Transactions
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      React.createElement("h2", { className: "mb-3 font-semibold" }, "Transactions"),
      expenses.map((e, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${e.date} | ${e.vendor} | $${e.amount} | ${e.category} | ${e.type}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => editExpense(i), className: "text-blue-500 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => deleteExpense(i), className: "text-red-500" }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};

    </script>
  </body>
</html>
