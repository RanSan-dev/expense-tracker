<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
   // 🌐 PHASE 2: FULL SETUP / CONTROL PANEL ADDED

// 🌐 PHASE 3: CARDS + INCOME + WARNINGS ADDED

// 🌐 FIXED PHASE 3 (buttons + setup working + better UI)

// 🌐 FIXED PHASE 3 (buttons + setup working + better UI)

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 3.1: SETUP LISTING + EDIT/DELETE

// 🌐 PHASE 4: EDIT EXPENSE + UI POLISH + STORE LABEL + CATEGORY REPORT

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);
  const [income, setIncome] = useState([]);

  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [newCard, setNewCard] = useState("");
  const [newIncome, setNewIncome] = useState({ name: "", amount: "" });

  const [editCatIndex, setEditCatIndex] = useState(null);
  const [editCardIndex, setEditCardIndex] = useState(null);
  const [editIncomeIndex, setEditIncomeIndex] = useState(null);
  const [editExpenseIndex, setEditExpenseIndex] = useState(null);

  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });

  useEffect(() => {
    setExpenses(JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));
    setIncome(JSON.parse(localStorage.getItem("expenseIncome") || "[]"));
  }, []);

  useEffect(() => localStorage.setItem("expenseAppData", JSON.stringify(expenses)), [expenses]);
  useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
  useEffect(() => localStorage.setItem("expenseCards", JSON.stringify(cards)), [cards]);
  useEffect(() => localStorage.setItem("expenseIncome", JSON.stringify(income)), [income]);

  // ===== EXPENSE HANDLING =====
  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) {
      return alert("Fill all fields");
    }

    const newItem = { ...form, amount: parseFloat(form.amount) };

    if (editExpenseIndex !== null) {
      const updated = [...expenses];
      updated[editExpenseIndex] = newItem;
      setExpenses(updated);
      setEditExpenseIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditExpenseIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // ===== NAV =====
  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
    React.createElement("button", { onClick: () => setView("dashboard"), className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, "Dashboard"),
    React.createElement("button", { onClick: () => setView("setup"), className: "bg-gray-700 text-white px-4 py-2 rounded shadow" }, "Setup"),
    React.createElement("button", { onClick: () => setView("report"), className: "bg-green-600 text-white px-4 py-2 rounded shadow" }, "Vendor Report"),
    React.createElement("button", { onClick: () => setView("categoryReport"), className: "bg-purple-600 text-white px-4 py-2 rounded shadow" }, "Category Report")
  );

  // ===== CATEGORY REPORT =====
  if (view === "categoryReport") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.category]) map[e.category] = [];
      map[e.category].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", { className: "text-xl font-bold mb-4" }, "Category Report"),
      Object.entries(map).map(([cat, items]) => {
        const subtotal = items.reduce((s, i) => s + i.amount, 0);
        return React.createElement("div", { key: cat, className: "mb-4" },
          React.createElement("h2", { className: "font-bold" }, `${cat} — $${subtotal.toFixed(2)}`),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} | ${i.store} | $${i.amount}`))
        );
      }),
      React.createElement("button", { onClick: () => window.print(), className: "mt-4 bg-blue-600 text-white px-4 py-2 rounded" }, "Print")
    );
  }

  // ===== DASHBOARD =====
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,
    React.createElement("h1", { className: "text-2xl font-bold mb-4" }, "Dashboard"),

    React.createElement("div", { className: "mb-4" }, `Total Spent: $${total}`),

    // FORM
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("input", { className: "border p-2 mr-2", type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement("input", { className: "border p-2 mr-2", placeholder: "Store", value: form.store, onChange: e => setForm({ ...form, store: e.target.value }) }),
      React.createElement("input", { className: "border p-2 mr-2", type: "number", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),

      React.createElement("select", { className: "border p-2 mr-2", value: form.category, onChange: e => setForm({ ...form, category: e.target.value }) },
        React.createElement("option", { value: "" }, "Category"),
        categories.map(c => React.createElement("option", { key: c.name }, c.name))
      ),

      React.createElement("select", { className: "border p-2 mr-2", value: form.card, onChange: e => setForm({ ...form, card: e.target.value }) },
        React.createElement("option", { value: "" }, "Card"),
        cards.map(c => React.createElement("option", { key: c }, c))
      ),

      React.createElement("button", { onClick: handleSubmit, className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, editExpenseIndex !== null ? "Update" : "Add")
    ),

    // LIST
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      expenses.map((e, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${e.date} | ${e.store} | $${e.amount}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => editExpense(i), className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => deleteExpense(i), className: "text-red-600" }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};

    </script>
  </body>
</html>
