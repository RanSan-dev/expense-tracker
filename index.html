<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
   // 🌐 PHASE 2: FULL SETUP / CONTROL PANEL ADDED

// 🌐 PHASE 3: CARDS + INCOME + WARNINGS ADDED

// 🌐 FIXED PHASE 3 (buttons + setup working + better UI)

// 🌐 PHASE 4: EDIT EXPENSE + UI POLISH + STORE LABEL + CATEGORY REPORT

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);
  const [income, setIncome] = useState([]);

  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [newCard, setNewCard] = useState("");
  const [newIncome, setNewIncome] = useState({ name: "", amount: "" });

  const [editCatIndex, setEditCatIndex] = useState(null);
  const [editCardIndex, setEditCardIndex] = useState(null);
  const [editIncomeIndex, setEditIncomeIndex] = useState(null);
  const [editExpenseIndex, setEditExpenseIndex] = useState(null);

  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });

  useEffect(() => {
    setExpenses(JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));
    setIncome(JSON.parse(localStorage.getItem("expenseIncome") || "[]"));
  }, []);

  useEffect(() => localStorage.setItem("expenseAppData", JSON.stringify(expenses)), [expenses]);
  useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
  useEffect(() => localStorage.setItem("expenseCards", JSON.stringify(cards)), [cards]);
  useEffect(() => localStorage.setItem("expenseIncome", JSON.stringify(income)), [income]);

  // ===== EXPENSE HANDLING =====
  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) {
      return alert("Fill all fields");
    }

    const newItem = { ...form, amount: parseFloat(form.amount) };

    if (editExpenseIndex !== null) {
      const updated = [...expenses];
      updated[editExpenseIndex] = newItem;
      setExpenses(updated);
      setEditExpenseIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditExpenseIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // ===== NAV =====
  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
    React.createElement("button", { onClick: () => setView("dashboard"), className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, "Dashboard"),
    React.createElement("button", { onClick: () => setView("setup"), className: "bg-gray-700 text-white px-4 py-2 rounded shadow" }, "Setup"),
    React.createElement("button", { onClick: () => setView("report"), className: "bg-green-600 text-white px-4 py-2 rounded shadow" }, "Vendor Report"),
    React.createElement("button", { onClick: () => setView("categoryReport"), className: "bg-purple-600 text-white px-4 py-2 rounded shadow" }, "Category Report")



    </script>
  </body>
</html>
