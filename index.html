<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
// CLEAN WORKING VERSION
const { useState, useEffect } = React;

function ExpenseTracker() {
  const [view, setView] = useState("dashboard");
  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);
  const [preview, setPreview] = useState([]);

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });

  useEffect(() => {
    setExpenses(JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));
  }, [expenses]);

  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) return;
    setExpenses([...expenses, { ...form, amount: parseFloat(form.amount) }]);
    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const nav = React.createElement("div", { className: "flex gap-3 mb-4" },
    React.createElement("button", { onClick: () => setView("dashboard") }, "Dashboard"),
    React.createElement("button", { onClick: () => setView("setup") }, "Setup")
  );

  if (view === "setup") {
    return React.createElement("div", null,
      nav,
      React.createElement("div", null,
        React.createElement("h3", null, "Categories"),
        categories.map((c, i) => React.createElement("div", { key: i }, c.name))
      )
    );
  }

  // DASHBOARD
  return React.createElement("div", { className: "p-4" },
    nav,

    // CSV IMPORT
    React.createElement("div", { className: "mb-4" },
      React.createElement("input", {
        type: "file",
        accept: ".csv",
        onChange: (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (evt) => {
            const rows = evt.target.result.split("\n").slice(1).filter(r => r.trim());

            const newItems = rows.map(r => {
              const [date, store, amount] = r.split(",");
              return {
                date,
                store,
                amount: Math.abs(parseFloat(amount)),
                category: "",
                card: ""
              };
            });

            window.csvPreview = newItems;
            setPreview(newItems);
            alert(newItems.length + " ready");
          };
          reader.readAsText(file);
        }
      }),

      preview.length > 0 && React.createElement("div", null,
        preview.map((p,i)=>React.createElement("div",{key:i},`${p.date} ${p.store} $${p.amount}`))
      ),

      React.createElement("button", {
        onClick: () => {
          if (!window.csvPreview) return;

          const existing = new Set(expenses.map(e => `${e.date}|${e.store}|${e.amount}`));

          const filtered = window.csvPreview.filter(i => !existing.has(`${i.date}|${i.store}|${i.amount}`));

          setExpenses([...expenses, ...filtered]);
          setPreview([]);
          window.csvPreview = [];
        }
      }, "Import")
    ),

    // FORM
    React.createElement("div", null,
      React.createElement("input", { type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement("input", { placeholder: "store", value: form.store, onChange: e => setForm({ ...form, store: e.target.value }) }),
      React.createElement("input", { placeholder: "amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),
      React.createElement("button", { onClick: handleSubmit }, "Add")
    ),

    // LIST
    React.createElement("div", null,
      expenses.map((e,i)=>React.createElement("div",{key:i},`${e.date} ${e.store} $${e.amount}`))
    )
  );
}

window.onload = () => {
  ReactDOM.createRoot(document.getElementById("root")).render(
    React.createElement(ExpenseTracker)
  );
};


    </script>
  </body>
</html>
