<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

 <script>
// UI + SETUP + AUTO CATEGORY + EDIT + GRAPH + MONTHLY + ALERTS + STORE MEMORY
const { useState, useEffect } = React;

function ExpenseTracker() {
  const [view, setView] = useState("dashboard");
  const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem("expenseAppData") || "[]"));
  const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
  const [preview, setPreview] = useState([]);
  const [editIndex, setEditIndex] = useState(null);

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "" });
  const [newCategory, setNewCategory] = useState("");
  const [budgetMap, setBudgetMap] = useState(() => JSON.parse(localStorage.getItem("expenseBudgets") || "{}"));

  // ⭐ STORE MEMORY
  const [storeList, setStoreList] = useState(() => JSON.parse(localStorage.getItem("expenseStores") || "[]"));

  // 🗓 MONTH SELECTOR
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  });

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));
  }, [expenses]);

  useEffect(() => {
    localStorage.setItem("expenseCategories", JSON.stringify(categories));
  }, [categories]);

  useEffect(() => {
    localStorage.setItem("expenseBudgets", JSON.stringify(budgetMap));
  }, [budgetMap]);

  useEffect(() => {
    localStorage.setItem("expenseStores", JSON.stringify(storeList));
  }, [storeList]);

  const getCategory = (store) => {
    const s = store.toLowerCase();
    if (s.includes("fred meyer") || s.includes("safeway") || s.includes("costco")) return "Groceries";
    if (s.includes("shell") || s.includes("chevron")) return "Fuel";
    if (s.includes("amazon") || s.includes("target")) return "Shopping";
    return "";
  };

  const rememberStore = (store) => {
    const s = store.trim();
    if (!s) return;

    setStoreList(prev => {
      const exists = prev.some(x => x.toLowerCase() === s.toLowerCase());
      if (exists) return prev;
      return [...prev, s];
    });
  };

  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount) return;

    const autoCat = form.category || getCategory(form.store);

    rememberStore(form.store);

    if (editIndex !== null) {
      const updated = [...expenses];
      updated[editIndex] = { ...form, category: autoCat, amount: parseFloat(form.amount) };
      setExpenses(updated);
      setEditIndex(null);
    } else {
      setExpenses([...expenses, { ...form, category: autoCat, amount: parseFloat(form.amount) }]);
    }

    setForm({ date: "", store: "", amount: "", category: "" });
  };

  // 🔥 FILTER BY MONTH
  const filteredExpenses = expenses.filter(e => e.date && e.date.startsWith(selectedMonth));

  const total = filteredExpenses.reduce((sum, e) => sum + e.amount, 0);

  const categoryTotals = filteredExpenses.reduce((acc, e) => {
    const cat = e.category || "Uncategorized";
    acc[cat] = (acc[cat] || 0) + e.amount;
    return acc;
  }, {});

  const budgetData = Object.keys(categoryTotals).map(cat => {
    const spent = categoryTotals[cat] || 0;
    const budget = parseFloat(budgetMap[cat] || 0);
    return { cat, spent, budget };
  });

  const nav = React.createElement("div", { className: "flex gap-4 mb-6" },
    React.createElement("button", { className: "bg-blue-600 text-white px-4 py-2 rounded", onClick: () => setView("dashboard") }, "Dashboard"),
    React.createElement("button", { className: "bg-gray-300 px-4 py-2 rounded", onClick: () => setView("setup") }, "Setup")
  );

  if (view === "setup") {
    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,
      React.createElement("div", { className: "bg-white p-4 rounded shadow" },
        React.createElement("div", { className: "font-bold mb-2" }, "Categories"),

        React.createElement("input", {
          className: "border p-2 mr-2",
          placeholder: "New Category",
          value: newCategory,
          onChange: e => setNewCategory(e.target.value)
        }),

        React.createElement("button", {
          className: "bg-blue-600 text-white px-3 py-2 rounded",
          onClick: () => {
            if (!newCategory) return;
            setCategories([...categories, newCategory]);
            setNewCategory("");
          }
        }, "Add"),

        React.createElement("div", { className: "mt-4" },
          categories.map((c,i) => {
            const name = typeof c === "object" ? c.name : c;
            return React.createElement("div", { key:i, className: "flex justify-between border-b py-1 items-center" },
              React.createElement("span", null, name),
              React.createElement("div", { className: "flex gap-2" },
                React.createElement("input", {
                  className: "border p-1 w-20",
                  placeholder: "Budget",
                  value: budgetMap[name] || "",
                  onChange: e => setBudgetMap({ ...budgetMap, [name]: e.target.value })
                }),
                React.createElement("button", {
                  className: "text-red-600",
                  onClick: () => setCategories(categories.filter((_,idx)=>idx!==i))
                }, "Delete")
              )
            );
          })
        )
      )
    );
  }

  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,

    // 🗓 MONTH PICKER
    React.createElement("div", { className: "mb-4" },
      React.createElement("input", {
        type: "month",
        className: "border p-2",
        value: selectedMonth,
        onChange: e => setSelectedMonth(e.target.value)
      })
    ),

    // TOTAL
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "text-lg font-bold" }, "Monthly Total"),
      React.createElement("div", { className: "text-2xl text-green-600" }, `$${total.toFixed(2)}`)
    ),

    // 🚨 ALERTS
    React.createElement("div", { className: "mb-4" },
      budgetData.map(({cat, spent, budget}, i) => {
        if (!budget) return null;
        const pct = spent / budget;
        if (pct < 0.8) return null;

        return React.createElement("div", {
          key: i,
          className: pct >= 1 ? "bg-red-200 p-2 mb-2 rounded" : "bg-yellow-200 p-2 mb-2 rounded"
        },
          pct >= 1
            ? `${cat} is OVER budget!`
            : `${cat} is at ${Math.round(pct*100)}% of budget`
        );
      })
    ),

    // BUDGET VS ACTUAL
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, "Budget vs Actual"),

      budgetData.map(({cat, spent, budget}, i) =>
        React.createElement("div", { key: i, className: "mb-3" },
          React.createElement("div", { className: "flex justify-between text-sm" },
            React.createElement("span", null, cat),
            React.createElement("span", null, `$${spent.toFixed(2)} / $${budget || 0}`)
          ),
          React.createElement("div", { className: "w-full bg-gray-200 h-3 rounded" },
            React.createElement("div", {
              className: spent > budget ? "bg-red-500 h-3 rounded" : "bg-green-500 h-3 rounded",
              style: { width: `${budget ? Math.min((spent / budget) * 100, 100) : 0}%` }
            })
          )
        )
      )
    ),

    // CSV IMPORT
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, "Import CSV"),

      React.createElement("input", {
        type: "file",
        accept: ".csv",
        onChange: (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (evt) => {
            const rows = evt.target.result.split("\n").slice(1).filter(r => r.trim());

            const newItems = rows.map(r => {
              let [date, store, amount] = r.split(",");
              if (!date || !store || !amount) return null;

              date = date.trim();
              store = store.trim();
              amount = Math.abs(parseFloat(amount.trim()));

              rememberStore(store);

              return {
                date,
                store,
                amount,
                category: getCategory(store)
              };
            }).filter(Boolean);

            window.csvPreview = newItems;
            setPreview(newItems);
          };
          reader.readAsText(file);
        }
      }),

      preview.length > 0 && React.createElement("div", { className: "mt-3" },
        React.createElement("div", { className: "font-semibold" }, "Preview"),
        preview.slice(0,5).map((p,i)=>
          React.createElement("div", { key:i, className: "text-sm" }, `${p.store} → ${p.category || "Uncategorized"}`)
        )
      ),

      React.createElement("button", {
        className: "mt-3 bg-blue-600 text-white px-4 py-2 rounded",
        onClick: () => {
          if (!window.csvPreview) return;

          const existing = new Set(expenses.map(e => `${e.date.trim()}|${e.store.trim().toLowerCase()}|${e.amount}`));

          const filtered = window.csvPreview.filter(i => {
            const key = `${i.date.trim()}|${i.store.trim().toLowerCase()}|${i.amount}`;
            return !existing.has(key);
          });

          setExpenses([...expenses, ...filtered]);
          setPreview([]);
          window.csvPreview = [];
        }
      }, "Import Data")
    ),

    // FORM
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, editIndex !== null ? "Edit Expense" : "Add Expense"),

      React.createElement("input", { className: "border p-2 mr-2", type: "date", value: form.date, onChange: e => setForm({ ...form, date: e.target.value }) }),
      React.createElement("input", { 
        className: "border p-2 mr-2", 
        placeholder: "Store", 
        list: "storeSuggestions",
        value: form.store, 
        onChange: e => setForm({ ...form, store: e.target.value }) 
      }),

      // 🔽 STORE AUTOCOMPLETE LIST
      React.createElement("datalist", { id: "storeSuggestions" },
        storeList.map((s,i)=>React.createElement("option", { key:i, value:s }))
      ),

      React.createElement("input", { className: "border p-2 mr-2", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),

      React.createElement("select", {
        className: "border p-2 mr-2",
        value: form.category,
        onChange: e => setForm({ ...form, category: e.target.value })
      },
        React.createElement("option", { value: "" }, "Auto / Select Category"),
        categories.map((c,i)=>{
          const name = typeof c === "object" ? c.name : c;
          return React.createElement("option", { key:i, value:name }, name);
        })
      ),

      React.createElement("button", { className: "bg-green-600 text-white px-3 py-2 rounded", onClick: handleSubmit }, editIndex !== null ? "Update" : "Add")
    ),

    // EMAIL EXPORT
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, "Email Report"),

      React.createElement("div", { className: "flex gap-3" },

        // DEFAULT EMAIL (mailto)
        React.createElement("button", {
          className: "bg-purple-600 text-white px-4 py-2 rounded",
          onClick: () => {
            const subject = `Expense Report ${selectedMonth}`;

            const bodyLines = filteredExpenses.map(e =>
              `${e.date} | ${e.store} | $${e.amount} | ${e.category || ""}`
            );

            const totalLine = `
Total: $${total.toFixed(2)}`;

            const body = encodeURIComponent(bodyLines.join("
") + totalLine);

            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${body}`;
          }
        }, "Email (Default)"),

        // GMAIL DIRECT
        React.createElement("button", {
          className: "bg-red-600 text-white px-4 py-2 rounded",
          onClick: () => {
            const subject = `Expense Report ${selectedMonth}`;

            const bodyLines = filteredExpenses.map(e =>
              `${e.date} | ${e.store} | $${e.amount} | ${e.category || ""}`
            );

            const totalLine = `
Total: $${total.toFixed(2)}`;

            const body = encodeURIComponent(bodyLines.join("
") + totalLine);

            const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${body}`;

            window.open(gmailUrl, "_blank");
          }
        }, "Open in Gmail")

      )
    ),

    // LIST
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      React.createElement("div", { className: "font-bold mb-2" }, "Expenses"),

      filteredExpenses.map((e,i)=>
        React.createElement("div", { key:i, className: "flex justify-between border-b py-2" },
          React.createElement("div", null,
            React.createElement("div", { className: "font-medium" }, e.store),
            React.createElement("div", { className: "text-xs text-gray-500" }, `${e.date} • ${e.category || "Uncategorized"}`)
          ),
          React.createElement("div", { className: "flex items-center gap-2" },
            React.createElement("span", { className: "font-bold" }, `$${e.amount}`),
            React.createElement("button", {
              className: "text-blue-600",
              onClick: () => {
                setForm(e);
                setEditIndex(i);
              }
            }, "Edit"),
            React.createElement("button", {
              className: "text-red-600",
              onClick: () => {
                if (!confirm("Delete this expense?")) return;
                const updated = expenses.filter((_, idx) => idx !== i);
                setExpenses(updated);
              }
            }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(ExpenseTracker));
};



</script>
