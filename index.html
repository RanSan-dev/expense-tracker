<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
  </head>

  <body>
    <div id="root"></div>

    <script>
  // 🌐 PHASE 5: YEAR SUMMARY + STABILITY FIXES

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

// 🌐 PHASE 5.1 FIX: RESTORE ALL VIEWS (NAV WORKING)

const { useState, useEffect } = React;

function ExpenseTracker() {
  const [currentMonth, setCurrentMonth] = useState(() => {
    const d = new Date();
    return d.toISOString().slice(0,7);
  });

  const [expenses, setExpenses] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cards, setCards] = useState([]);
  const [atmBudget, setAtmBudget] = useState(parseFloat(localStorage.getItem("atmBudget") || "0"));
  const [view, setView] = useState("dashboard");

  const [form, setForm] = useState({ date: "", store: "", amount: "", category: "", card: "" });
  const [editExpenseIndex, setEditExpenseIndex] = useState(null);

  const [storeSuggestions, setStoreSuggestions] = useState([]);
  const normalizeStore = (s) => (s || "").trim();
  const keyStore = (s) => normalizeStore(s).toLowerCase();

  useEffect(() => {
    const savedExpenses = JSON.parse(localStorage.getItem("expenseAppData") || "[]");
    setExpenses(savedExpenses);
    setCategories(JSON.parse(localStorage.getItem("expenseCategories") || "[]"));
    setCards(JSON.parse(localStorage.getItem("expenseCards") || "[]"));

    const uniqueStores = [...new Set(savedExpenses.map(e => e.store).filter(Boolean))];
    setStoreSuggestions(uniqueStores);
  }, []);

  useEffect(() => {
    localStorage.setItem("expenseAppData", JSON.stringify(expenses));

    const map = {};
    expenses.forEach(e => {
      const name = normalizeStore(e.store);
      if (!name) return;
      const k = keyStore(name);
      if (!map[k]) map[k] = name;
    });
    setStoreSuggestions(Object.values(map));
  }, [expenses]);

  const handleSubmit = () => {
    if (!form.date || !form.store || !form.amount || !form.category) return alert("Fill all fields");

    const newItem = { ...form, store: normalizeStore(form.store), amount: parseFloat(form.amount) };

    if (editExpenseIndex !== null) {
      const updated = [...expenses];
      updated[editExpenseIndex] = newItem;
      setExpenses(updated);
      setEditExpenseIndex(null);
    } else {
      setExpenses([...expenses, newItem]);
    }

    setCurrentMonth(form.date.slice(0,7));
    setForm({ date: "", store: "", amount: "", category: "", card: "" });
  };

  const editExpense = (i) => {
    setForm(expenses[i]);
    setEditExpenseIndex(i);
  };

  const deleteExpense = (i) => {
    const updated = [...expenses];
    updated.splice(i, 1);
    setExpenses(updated);
  };

  const expensesForMonth = expenses.filter(e => (e.date || "").startsWith(currentMonth));
  const total = expensesForMonth.reduce((s, e) => s + e.amount, 0);

  // ===== BUDGET + DAILY TRACKING =====
  const totalBudget = categories.reduce((s, c) => s + (parseFloat(c.budget) || 0), 0);

  const today = new Date();
  const [year, month] = currentMonth.split("-");
  const daysInMonth = new Date(year, month, 0).getDate();

  const currentDay = today.getMonth()+1 == parseInt(month) && today.getFullYear() == parseInt(year)
    ? today.getDate()
    : daysInMonth;

  const dailyBudget = totalBudget / daysInMonth;
  const expectedSpendToDate = dailyBudget * currentDay;
  const difference = total - expectedSpendToDate;

  // ===== ADVANCED DAILY BURN (YOUR SHEET LOGIC) =====
  const cumulativeSpend = expensesForMonth
    .sort((a,b)=> new Date(a.date) - new Date(b.date))
    .reduce((arr, e) => {
      const last = arr.length ? arr[arr.length-1].total : 0;
      arr.push({
        date: e.date,
        total: last + e.amount
      });
      return arr;
    }, []);

  const burnToday = cumulativeSpend.length ? cumulativeSpend[cumulativeSpend.length-1].total : 0;
  const expectedToday = dailyBudget * currentDay;
  const burnDiff = burnToday - expectedToday;

  // PROJECTED END OF MONTH
  const projectedTotal = currentDay > 0 ? (total / currentDay) * daysInMonth : 0;

  // ATM TRACKING
  // include ATM or Cash category
  const atmSpent = expensesForMonth
    .filter(e => e.category === "ATM" || e.category === "Cash")
    .reduce((s,e)=>s+e.amount,0);
  const atmRemaining = atmBudget - atmSpent;

  const yearTotals = {};
  expenses.forEach(e => {
    if (!yearTotals[e.category]) yearTotals[e.category] = 0;
    yearTotals[e.category] += e.amount;
  });

  const nav = React.createElement("div", { className: "flex gap-3 mb-6" },
  React.createElement("button", { onClick: () => setView("dashboard"), className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, "Dashboard"),
  React.createElement("button", { onClick: () => setView("setup"), className: "bg-gray-700 text-white px-4 py-2 rounded shadow" }, "Setup"),
  React.createElement("button", { onClick: () => setView("report"), className: "bg-green-600 text-white px-4 py-2 rounded shadow" }, "Vendor Report"),
  React.createElement("button", { onClick: () => setView("categoryReport"), className: "bg-purple-600 text-white px-4 py-2 rounded shadow" }, "Category Report"),
  React.createElement("button", { onClick: () => setView("yearSummary"), className: "bg-orange-600 text-white px-4 py-2 rounded shadow" }, "Year Summary"),
  React.createElement("button", { onClick: () => setView("print"), className: "bg-black text-white px-4 py-2 rounded shadow" }, "Print Report")
);

  // ===== SETUP (FULL RESTORE) =====
  const [newCategory, setNewCategory] = useState({ name: "", budget: "" });
  const [newCard, setNewCard] = useState("");

  const [editCatIndex, setEditCatIndex] = useState(null);
  const [editCardIndex, setEditCardIndex] = useState(null);

  useEffect(() => localStorage.setItem("expenseCategories", JSON.stringify(categories)), [categories]);
  useEffect(() => localStorage.setItem("expenseCards", JSON.stringify(cards)), [cards]);
  useEffect(() => localStorage.setItem("atmBudget", atmBudget), [atmBudget]);

  const addCategory = () => {
    if (!newCategory.name || !newCategory.budget) return alert("Enter category + budget");

    if (editCatIndex !== null) {
      const updated = [...categories];
      updated[editCatIndex] = { name: newCategory.name, budget: parseFloat(newCategory.budget) };
      setCategories(updated);
      setEditCatIndex(null);
    } else {
      setCategories([...categories, { name: newCategory.name, budget: parseFloat(newCategory.budget) }]);
    }

    setNewCategory({ name: "", budget: "" });
  };

  const addCard = () => {
    if (!newCard) return alert("Enter card name");

    if (editCardIndex !== null) {
      const updated = [...cards];
      updated[editCardIndex] = newCard;
      setCards(updated);
      setEditCardIndex(null);
    } else {
      setCards([...cards, newCard]);
    }

    setNewCard("");
  };

  if (view === "setup") {
    return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
      nav,

      // ATM SETUP (NEW)
      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("h2", { className: "font-bold mb-2" }, "ATM / Cash Pool"),
        React.createElement("input", {
          className: "border p-2 mr-2",
          type: "number",
          placeholder: "Monthly ATM Budget",
          value: atmBudget,
          onChange: e => setAtmBudget(parseFloat(e.target.value) || 0)
        })
      ),

      // CATEGORIES
      React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Categories"),

        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Name", value: newCategory.name, onChange: e => setNewCategory({ ...newCategory, name: e.target.value }) }),
        React.createElement("input", { className: "border p-2 mr-2", type: "number", placeholder: "Budget", value: newCategory.budget, onChange: e => setNewCategory({ ...newCategory, budget: e.target.value }) }),

        React.createElement("button", { onClick: addCategory, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCatIndex !== null ? "Update" : "Add"),

        categories.map((c, i) =>
          React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
            React.createElement("span", null, `${c.name} - $${c.budget}`),
            React.createElement("div", null,
              React.createElement("button", {
                onClick: () => {
                  setNewCategory({ name: c.name, budget: c.budget });
                  setEditCatIndex(i);
                },
                className: "text-blue-600 mr-2"
              }, "Edit"),
              React.createElement("button", {
                onClick: () => setCategories(categories.filter((_, idx) => idx !== i)),
                className: "text-red-600"
              }, "Delete")
            )
          )
        )
      ),

      // CARDS
      React.createElement("div", { className: "bg-white p-4 rounded shadow" },
        React.createElement("h2", { className: "font-bold mb-2" }, "Cards"),

        React.createElement("input", { className: "border p-2 mr-2", placeholder: "Card Name", value: newCard, onChange: e => setNewCard(e.target.value) }),

        React.createElement("button", { onClick: addCard, className: "bg-blue-600 text-white px-3 py-1 rounded" }, editCardIndex !== null ? "Update" : "Add"),

        cards.map((c, i) =>
          React.createElement("div", { key: i, className: "flex justify-between border-b py-1" },
            React.createElement("span", null, c),
            React.createElement("div", null,
              React.createElement("button", {
                onClick: () => {
                  setNewCard(c);
                  setEditCardIndex(i);
                },
                className: "text-blue-600 mr-2"
              }, "Edit"),
              React.createElement("button", {
                onClick: () => setCards(cards.filter((_, idx) => idx !== i)),
                className: "text-red-600"
              }, "Delete")
            )
          )
        )
      )
    );
  }

  // VENDOR REPORT
  if (view === "report") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.store]) map[e.store] = [];
      map[e.store].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Vendor Report"),
      Object.entries(map).map(([store, items]) =>
        React.createElement("div", { key: store },
          React.createElement("strong", null, store),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} $${i.amount}`))
        )
      )
    );
  }

  // CATEGORY REPORT
  if (view === "categoryReport") {
    const map = {};
    expenses.forEach(e => {
      if (!map[e.category]) map[e.category] = [];
      map[e.category].push(e);
    });

    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Category Report"),
      Object.entries(map).map(([cat, items]) =>
        React.createElement("div", { key: cat },
          React.createElement("strong", null, cat),
          items.map((i, idx) => React.createElement("div", { key: idx }, `${i.date} $${i.amount}`))
        )
      )
    );
  }

  // YEAR SUMMARY
  if (view === "yearSummary") {
    return React.createElement("div", { className: "p-6 bg-white" },
      nav,
      React.createElement("h1", null, "Year Summary"),
      Object.entries(yearTotals).map(([cat, total]) =>
        React.createElement("div", { key: cat }, `${cat}: $${total.toFixed(2)}`)
      )
    );
  }

  // PRINTABLE REPORT
  if (view === "print") {
    return React.createElement("div", { className: "p-6 bg-white" },
      React.createElement("h1", { className: "text-2xl font-bold mb-4" }, `Monthly Report (${currentMonth})`),

      React.createElement("div", { className: "mb-4" },
        React.createElement("strong", null, `Total Spent: $${total.toFixed(2)}`),
        React.createElement("div", null, `Budget: $${totalBudget.toFixed(2)}`),
        React.createElement("div", null, `Projected: $${projectedTotal.toFixed(2)}`)
      ),

      React.createElement("div", { className: "mb-4" },
        React.createElement("h2", { className: "font-bold" }, "Categories"),
        categories.map(cat => {
          const spent = expensesForMonth.filter(e => e.category === cat.name).reduce((s,e)=>s+e.amount,0);
          const allocated = parseFloat(cat.budget) || 0;
          const remaining = allocated - spent;

          return React.createElement("div", { key: cat.name, className: "flex justify-between border-b py-1" },
            React.createElement("span", null, cat.name),
            React.createElement("span", null,
              remaining < 0 ? `Over $${Math.abs(remaining).toFixed(2)}` : `$${remaining.toFixed(2)} left`
            )
          );
        })
      ),

      React.createElement("button", {
        onClick: () => window.print(),
        className: "mt-4 bg-blue-600 text-white px-4 py-2 rounded"
      }, "Print / Save PDF"),

      React.createElement("button", {
        onClick: () => setView("dashboard"),
        className: "mt-4 ml-2 bg-gray-600 text-white px-4 py-2 rounded"
      }, "Back")
    );
  }

  // DASHBOARD
  return React.createElement("div", { className: "p-6 bg-gray-100 min-h-screen" },
    nav,
    React.createElement("h1", { className: "text-2xl font-bold mb-4" }, "Dashboard"),

    // Month selector
    React.createElement("div", { className: "mb-4" },
      React.createElement("label", { className: "mr-2" }, "Month:"),
      React.createElement("input", {
        type: "month",
        value: currentMonth,
        onChange: e => setCurrentMonth(e.target.value),
        className: "border p-2"
      })
    ),

    React.createElement("div", { className: "mb-4 font-semibold" }, `Total: $${total}`),

    // TOTAL BUDGET + DAILY STATUS
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold" }, `Monthly Budget: $${totalBudget.toFixed(2)}`),
      React.createElement("div", null, `Daily Budget: $${dailyBudget.toFixed(2)}`),
      React.createElement("div", null, `Expected Spend (by today): $${expectedSpendToDate.toFixed(2)}`),
      React.createElement("div", {
        className: difference > 0 ? "text-red-600 font-bold" : "text-green-600 font-bold"
      }, difference > 0
        ? `Over by $${difference.toFixed(2)}`
        : `Under by $${Math.abs(difference).toFixed(2)}`)
    ),

    // PROJECTION
    React.createElement("div", { className: "mt-2 font-bold" },
      `Projected End-of-Month: $${projectedTotal.toFixed(2)}`
    ),

    // DAILY BURN DISPLAY (NEW)
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-1" }, "Daily Burn Tracking"),
      React.createElement("div", null, `Day: ${currentDay} / ${daysInMonth}`),
      React.createElement("div", null, `Expected Spend: $${expectedToday.toFixed(2)}`),
      React.createElement("div", null, `Actual Spend: $${burnToday.toFixed(2)}`),
      React.createElement("div", {
        className: burnDiff > 0 ? "text-red-600 font-bold" : "text-green-600 font-bold"
      }, burnDiff > 0
        ? `Over pace by $${burnDiff.toFixed(2)}`
        : `Under pace by $${Math.abs(burnDiff).toFixed(2)}`)
    ),

    // EMAIL BUTTON (Styled Summary Report)
    React.createElement("button", {
      onClick: () => {
        // Build category stats
        const catStats = categories.map(cat => {
          const spent = expensesForMonth.filter(e => e.category === cat.name).reduce((s,e)=>s+e.amount,0);
          const allocated = parseFloat(cat.budget) || 0;
          const remaining = allocated - spent;
          const pct = allocated ? (spent/allocated) : 0;
          return { name: cat.name, spent, allocated, remaining, pct };
        });

        // Top 3 problem categories
        const top3 = [...catStats]
          .sort((a,b) => (b.pct - a.pct) || (a.remaining - b.remaining))
          .slice(0,3)
          .map(c => `• ${c.name}: ${c.remaining < 0 ? `Over $${Math.abs(c.remaining).toFixed(2)}` : `$${c.remaining.toFixed(2)} left`}`)
          .join("\n");

        const statusEmoji = burnDiff > 0 ? "🔴" : burnDiff > -50 ? "🟡" : "🟢";

        const subject = encodeURIComponent("Monthly Budget Snapshot");
        const body = encodeURIComponent(
`📊 MONTHLY SNAPSHOT

Month: ${currentMonth}

${statusEmoji} OVERALL STATUS
Total Spent: $${total.toFixed(2)}
Budget: $${totalBudget.toFixed(2)}
Projected: $${projectedTotal.toFixed(2)}

📅 DAILY PACE
Expected: $${expectedToday.toFixed(2)}
Actual: $${burnToday.toFixed(2)}
${burnDiff > 0 ? `Over pace by $${burnDiff.toFixed(2)}` : `Under pace by $${Math.abs(burnDiff).toFixed(2)}`}

💵 CASH
Remaining: $${atmRemaining.toFixed(2)}

⚠️ TOP 3 AREAS
${top3}

📂 CATEGORIES
${catStats.map(c => `${c.name}: ${c.remaining < 0 ? `Over $${Math.abs(c.remaining).toFixed(2)}` : `$${c.remaining.toFixed(2)} left`}`).join("\n")}

— Sent from Budget App`
        );

        // HTML STYLE EMAIL (dashboard look)
        const htmlBody = `
        <div style="font-family:Arial;padding:10px;">
          <h2>📊 Monthly Snapshot (${currentMonth})</h2>
          <div style="padding:10px;border-radius:8px;background:${burnDiff>0?'#ffe5e5':'#e6ffed'};">
            <strong>${statusEmoji} Status:</strong><br/>
            Spent: $${total.toFixed(2)}<br/>
            Budget: $${totalBudget.toFixed(2)}<br/>
            Projected: $${projectedTotal.toFixed(2)}
          </div>
          <br/>
          <div>
            <strong>📅 Daily Pace</strong><br/>
            Expected: $${expectedToday.toFixed(2)}<br/>
            Actual: $${burnToday.toFixed(2)}<br/>
            <span style="color:${burnDiff>0?'red':'green'};">
              ${burnDiff>0?`Over $${burnDiff.toFixed(2)}`:`Under $${Math.abs(burnDiff).toFixed(2)}`}
            </span>
          </div>
          <br/>
          <div>
            <strong>💵 Cash Remaining:</strong> $${atmRemaining.toFixed(2)}
          </div>
          <br/>
          <div>
            <strong>⚠️ Top 3</strong><br/>
            ${top3.replace(/\n/g,'<br/>')}
          </div>
          <br/>
          <div>
            <strong>📂 Categories</strong><br/>
            ${catStats.map(c=>`<div>${c.name}: <span style="color:${c.remaining<0?'red':'green'}">${c.remaining<0?`Over $${Math.abs(c.remaining).toFixed(2)}`:`$${c.remaining.toFixed(2)} left`}</span></div>`).join('')}
          </div>
        </div>`;

        // IMPORTANT: Gmail ignores HTML in body param, use clean formatted text instead
        const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`;
        window.open(gmailUrl, '_blank');
      },
      className: "mb-4 bg-green-600 text-white px-4 py-2 rounded shadow"
    }, "Email Report"),

    // ATM DISPLAY (NEW)
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold" }, "ATM / Cash"),
      React.createElement("div", null, `Budget: $${atmBudget.toFixed(2)}`),
      React.createElement("div", null, `Spent: $${atmSpent.toFixed(2)}`),
      React.createElement("div", {
        className: atmRemaining < 0 ? "text-red-600" : "text-green-600"
      }, atmRemaining < 0
        ? `Over by $${Math.abs(atmRemaining).toFixed(2)}`
        : `Remaining: $${atmRemaining.toFixed(2)}`)
    ),

    // CATEGORY BARS (buckets + percent)
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      categories.map(cat => {
        const spent = expensesForMonth.filter(e => e.category === cat.name).reduce((s, e) => s + e.amount, 0);
        const allocated = parseFloat(cat.budget) || 0;
        const remaining = allocated - spent;
        const percent = allocated ? (spent / allocated) * 100 : 0;

        return React.createElement("div", { key: cat.name, className: "mb-3" },
          React.createElement("div", { className: "flex justify-between text-sm font-medium" },
            React.createElement("span", null, cat.name),
            React.createElement("span", null, `$${spent} / $${allocated}`)
          ),

          // REMAINING DISPLAY (NEW)
          React.createElement("div", {
            className: remaining < 0 ? "text-red-600 text-sm" : "text-green-600 text-sm"
          }, remaining < 0
            ? `Over by $${Math.abs(remaining).toFixed(2)}`
            : `Remaining: $${remaining.toFixed(2)}`
          ),

          // PROGRESS BAR (KEPT)
          React.createElement("div", { className: "w-full bg-gray-200 h-2 rounded mt-1" },
            React.createElement("div", {
              className: percent > 100 ? "bg-red-500 h-2 rounded" : percent > 80 ? "bg-yellow-400 h-2 rounded" : "bg-green-500 h-2 rounded",
              style: { width: Math.min(percent, 100) + "%" }
            })
          )
        );
      })
    ),

    // CSV IMPORT (NEW)
    React.createElement("div", { className: "bg-white p-4 rounded shadow mb-4" },
      React.createElement("div", { className: "font-bold mb-2" }, "Import CSV"),
      React.createElement("input", {
        type: "file",
        accept: ".csv",
        onChange: (e) => {
          const file = e.target.files[0];
          if (!file) return;

        value: form.store,
        onChange: e => {
          const val = e.target.value;
          const match = storeSuggestions.find(s => keyStore(s).startsWith(keyStore(val)));
          setForm({ ...form, store: match || val });
        }
      }),
      React.createElement("datalist", { id: "store-list" },
        storeSuggestions.map((s, i) => React.createElement("option", { key: i, value: s }))
      ),
      React.createElement("input", { className: "border p-2", type: "number", placeholder: "Amount", value: form.amount, onChange: e => setForm({ ...form, amount: e.target.value }) }),

      React.createElement("select", { className: "border p-2", value: form.category, onChange: e => setForm({ ...form, category: e.target.value }) },
        React.createElement("option", { value: "" }, "Category"),
        categories.map(c => React.createElement("option", { key: c.name }, c.name))
      ),

      React.createElement("select", { className: "border p-2", value: form.card, onChange: e => setForm({ ...form, card: e.target.value }) },
        React.createElement("option", { value: "" }, "Card"),
        cards.map(c => React.createElement("option", { key: c }, c))
      ),

      React.createElement("button", { onClick: handleSubmit, className: "bg-blue-600 text-white px-4 py-2 rounded shadow" }, editExpenseIndex !== null ? "Update" : "Add")
    ),

    // LIST
    React.createElement("div", { className: "bg-white p-4 rounded shadow" },
      expensesForMonth.map((e, i) =>
        React.createElement("div", { key: i, className: "flex justify-between border-b py-2" },
          React.createElement("span", null, `${e.date} | ${e.store} | $${e.amount}`),
          React.createElement("div", null,
            React.createElement("button", { onClick: () => editExpense(i), className: "text-blue-600 mr-2" }, "Edit"),
            React.createElement("button", { onClick: () => deleteExpense(i), className: "text-red-600" }, "Delete")
          )
        )
      )
    )
  );
}

window.onload = () => {
  const root = document.getElementById("root");
  if (root) {
    ReactDOM.createRoot(root).render(
      React.createElement(ExpenseTracker)
    );
  }
};

    </script>
  </body>
</html>
